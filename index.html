<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <title>로또 5세트 추천기</title>
  <style>
    :root[data-theme="light"] {
      --bg: #f3f4f6;
      --container-bg: #ffffff;
      --text: #111827;
      --subtext: #374151;
      --shadow: rgba(0, 0, 0, 0.08);
      --toggle-bg: #e5e7eb;
      --toggle-text: #374151;
    }

    :root[data-theme="dark"] {
      --bg: #111827;
      --container-bg: #1f2937;
      --text: #f9fafb;
      --subtext: #d1d5db;
      --shadow: rgba(0, 0, 0, 0.4);
      --toggle-bg: #374151;
      --toggle-text: #f9fafb;
    }

    * {
      transition: background 0.3s, color 0.3s, box-shadow 0.3s;
    }

    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px 20px;
      background: var(--bg);
      color: var(--text);
      margin: 0;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      max-width: 600px;
      margin: 0 auto 16px;
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border: none;
      border-radius: 20px;
      background: var(--toggle-bg);
      color: var(--toggle-text);
      font-size: 14px;
      cursor: pointer;
    }

    .theme-toggle:hover {
      opacity: 0.8;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: var(--container-bg);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 24px var(--shadow);
    }

    h1 {
      color: var(--text);
      margin-top: 0;
    }

    .generate-btn {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .generate-btn:hover {
      background: #1d4ed8;
    }

    .set {
      margin-top: 20px;
      color: var(--subtext);
    }

    .numbers {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .ball {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #facc15;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #111827;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <button class="theme-toggle" onclick="toggleTheme()">
      <span id="theme-icon">🌙</span>
      <span id="theme-label">다크 모드</span>
    </button>
  </div>

  <div class="container">
    <h1>로또 번호 5세트 추천</h1>
    <button class="generate-btn" onclick="generateSets()">번호 추천받기</button>
    <div id="result"></div>
  </div>

  <script>
    const html = document.documentElement;
    const icon = document.getElementById("theme-icon");
    const label = document.getElementById("theme-label");

    function applyTheme(theme) {
      html.setAttribute("data-theme", theme);
      if (theme === "dark") {
        icon.textContent = "☀️";
        label.textContent = "라이트 모드";
      } else {
        icon.textContent = "🌙";
        label.textContent = "다크 모드";
      }
      localStorage.setItem("theme", theme);
    }

    function toggleTheme() {
      const current = html.getAttribute("data-theme");
      applyTheme(current === "dark" ? "light" : "dark");
    }

    // 저장된 테마 복원
    const saved = localStorage.getItem("theme");
    if (saved) applyTheme(saved);

    function generateOneSet() {
      const numbers = [];
      while (numbers.length < 6) {
        const num = Math.floor(Math.random() * 45) + 1;
        if (!numbers.includes(num)) numbers.push(num);
      }
      return numbers.sort((a, b) => a - b);
    }

    function generateSets() {
      const result = document.getElementById("result");
      result.innerHTML = "";

      for (let i = 0; i < 5; i++) {
        const set = generateOneSet();

        const setDiv = document.createElement("div");
        setDiv.className = "set";

        const title = document.createElement("div");
        title.innerHTML = `<strong>${i + 1}번 세트</strong>`;

        const numbersDiv = document.createElement("div");
        numbersDiv.className = "numbers";

        set.forEach(num => {
          const ball = document.createElement("div");
          ball.className = "ball";
          ball.textContent = num;
          numbersDiv.appendChild(ball);
        });

        setDiv.appendChild(title);
        setDiv.appendChild(numbersDiv);
        result.appendChild(setDiv);
      }
    }
  </script>
</body>
</html>
