<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawRecipe — 알러지 없는 밥상</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FDF6EC;
    --warm: #F5E6CC;
    --accent: #D4541A;
    --accent2: #E8853A;
    --soft: #F7EFE3;
    --dark: #2A1F14;
    --mid: #7A6355;
    --light: #C4A882;
    --green: #5A8A5A;
    --green-light: #EAF4EA;
    --red-light: #FDEAEA;
    --red: #C0392B;
    --tag-bg: #FFF0E3;
    --tag-border: #E8B882;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
  }

  /* TOP NAV */
  nav {
    background: var(--cream);
    border-bottom: 1.5px solid var(--warm);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--dark); }
  .nav-sub { font-size: 12px; color: var(--mid); }

  /* LAYOUT */
  .app-shell {
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: calc(100vh - 60px);
  }

  /* LEFT PANEL */
  .panel-left {
    background: var(--soft);
    border-right: 1.5px solid var(--warm);
    padding: 28px 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--light);
    margin-bottom: 12px;
  }

  /* PET SELECTOR */
  .pet-tabs {
    display: flex;
    gap: 8px;
  }
  .pet-tab {
    flex: 1;
    padding: 10px 8px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--warm);
    background: white;
    cursor: pointer;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--mid);
    transition: all 0.18s;
  }
  .pet-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .pet-tab .emoji { font-size: 20px; display: block; margin-bottom: 4px; }

  /* ALLERGY INPUT */
  .allergy-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }
  .allergy-chip {
    padding: 6px 12px;
    border-radius: 99px;
    border: 1.5px solid var(--tag-border);
    background: white;
    font-size: 12px;
    color: var(--dark);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .allergy-chip:hover { border-color: var(--accent2); background: var(--tag-bg); }
  .allergy-chip.selected {
    background: var(--red-light);
    border-color: var(--red);
    color: var(--red);
    font-weight: 600;
  }
  .allergy-chip.selected::before { content: '✕ '; }

  .custom-allergy {
    margin-top: 10px;
    display: flex;
    gap: 8px;
  }
  .custom-allergy input {
    flex: 1;
    padding: 9px 14px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--warm);
    background: white;
    font-size: 13px;
    font-family: inherit;
    color: var(--dark);
    outline: none;
  }
  .custom-allergy input:focus { border-color: var(--accent2); }
  .btn-add {
    padding: 9px 14px;
    border-radius: var(--radius-sm);
    background: var(--accent);
    color: white;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-add:hover { background: var(--accent2); }

  /* MEAL TYPE */
  .meal-types {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }
  .meal-chip {
    padding: 7px 14px;
    border-radius: 99px;
    border: 1.5px solid var(--warm);
    background: white;
    font-size: 12px;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .meal-chip.active {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green);
    font-weight: 600;
  }

  /* SEARCH BUTTON */
  .btn-search {
    width: 100%;
    padding: 15px;
    border-radius: var(--radius);
    background: var(--accent);
    color: white;
    border: none;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: -0.3px;
  }
  .btn-search:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-search:disabled { background: var(--light); cursor: not-allowed; transform: none; }

  /* SELECTED TAGS */
  .selected-summary {
    background: var(--red-light);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 12px;
    color: var(--red);
    font-weight: 500;
    min-height: 40px;
    line-height: 1.6;
  }
  .selected-summary.empty { color: var(--light); font-weight: 400; font-style: italic; }

  /* RIGHT: RESULTS */
  .panel-right {
    padding: 32px 36px;
    overflow-y: auto;
  }

  .results-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .results-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 24px;
    color: var(--dark);
  }
  .results-count { font-size: 13px; color: var(--mid); }

  /* RECIPE CARDS */
  .recipe-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .recipe-card {
    background: white;
    border-radius: var(--radius);
    border: 1.5px solid var(--warm);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }
  .recipe-card:hover {
    border-color: var(--accent2);
    box-shadow: 0 8px 24px rgba(212,84,26,0.12);
    transform: translateY(-3px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-emoji-band {
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    background: var(--soft);
    border-bottom: 1.5px solid var(--warm);
  }
  .card-body { padding: 16px; }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 6px;
  }
  .card-desc {
    font-size: 12px;
    color: var(--mid);
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 10px;
  }
  .tag {
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 500;
  }
  .tag-safe { background: var(--green-light); color: var(--green); }
  .tag-type { background: var(--tag-bg); color: var(--accent); }
  .tag-pet  { background: #EEF2FF; color: #5B6FD8; }

  .card-ingredients {
    font-size: 11px;
    color: var(--mid);
    line-height: 1.7;
  }
  .card-ingredients strong { color: var(--dark); font-weight: 600; }

  /* EMPTY / LOADING STATE */
  .state-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    text-align: center;
    color: var(--light);
    gap: 12px;
  }
  .state-empty .big-emoji { font-size: 64px; }
  .state-empty h2 { font-size: 18px; font-weight: 700; color: var(--mid); }
  .state-empty p { font-size: 13px; line-height: 1.7; max-width: 300px; }

  .loading-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 8px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    animation: bounce 0.9s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.18s; }
  .dot:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); opacity: .6; }
    50%      { transform: translateY(-8px); opacity: 1; }
  }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(42,31,20,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--cream);
    border-radius: 20px;
    padding: 32px;
    max-width: 520px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    transform: scale(0.94);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .modal-title { font-family: 'Black Han Sans', sans-serif; font-size: 22px; }
  .modal-close {
    background: none; border: none; font-size: 20px; cursor: pointer;
    color: var(--mid); padding: 0 4px; line-height: 1;
  }
  .modal-section { margin-bottom: 20px; }
  .modal-section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--light); margin-bottom: 10px;
  }
  .ingredient-list {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .ing-chip {
    padding: 5px 12px; border-radius: 99px;
    font-size: 12px; font-weight: 500;
    background: var(--green-light); color: var(--green);
    border: 1px solid #9EC89E;
  }
  .steps-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .steps-list li {
    display: flex; gap: 12px; align-items: flex-start;
    font-size: 13px; color: var(--dark); line-height: 1.6;
  }
  .step-num {
    min-width: 24px; height: 24px; border-radius: 50%;
    background: var(--accent); color: white;
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .nutrition-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .nutr-cell {
    background: white; border-radius: 10px;
    border: 1.5px solid var(--warm);
    padding: 10px; text-align: center;
  }
  .nutr-val { font-size: 18px; font-weight: 700; color: var(--accent); }
  .nutr-lbl { font-size: 11px; color: var(--mid); margin-top: 2px; }
  .warning-box {
    background: #FFF8EC; border: 1.5px solid #F0C060;
    border-radius: var(--radius-sm); padding: 12px 14px;
    font-size: 12px; color: #8A6020; line-height: 1.6;
  }

  .ai-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 99px;
    background: linear-gradient(135deg, #f5a623, #e05c1e);
    color: white; font-size: 11px; font-weight: 700;
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<nav>
  <div class="logo">Paw<span>Recipe</span> 🐾</div>
  <div class="nav-sub">알러지 없는 맞춤 레시피</div>
</nav>

<div class="app-shell">

  <!-- LEFT PANEL -->
  <aside class="panel-left">

    <!-- 반려동물 선택 -->
    <div>
      <div class="section-label">반려동물</div>
      <div class="pet-tabs">
        <div class="pet-tab active" data-pet="dog" onclick="selectPet('dog')">
          <span class="emoji">🐶</span>강아지
        </div>
        <div class="pet-tab" data-pet="cat" onclick="selectPet('cat')">
          <span class="emoji">🐱</span>고양이
        </div>
      </div>
    </div>

    <!-- 알러지 성분 -->
    <div>
      <div class="section-label">알러지 성분 선택</div>
      <div class="allergy-grid" id="allergyGrid"></div>
      <div class="custom-allergy">
        <input type="text" id="customInput" placeholder="기타 성분 직접 입력..." onkeydown="if(event.key==='Enter') addCustom()">
        <button class="btn-add" onclick="addCustom()">추가</button>
      </div>
    </div>

    <!-- 선택 요약 -->
    <div>
      <div class="section-label">제외할 성분</div>
      <div class="selected-summary empty" id="selectedSummary">아직 선택된 성분이 없어요</div>
    </div>

    <!-- 식사 유형 -->
    <div>
      <div class="section-label">레시피 유형</div>
      <div class="meal-types">
        <div class="meal-chip active" data-meal="all" onclick="selectMeal(this)">전체</div>
        <div class="meal-chip" data-meal="home" onclick="selectMeal(this)">수제 간식</div>
        <div class="meal-chip" data-meal="main" onclick="selectMeal(this)">일반식</div>
        <div class="meal-chip" data-meal="raw" onclick="selectMeal(this)">생식</div>
        <div class="meal-chip" data-meal="supplement" onclick="selectMeal(this)">영양 보충</div>
      </div>
    </div>

    <button class="btn-search" id="searchBtn" onclick="doSearch()">🔍 레시피 찾기</button>

  </aside>

  <!-- RIGHT PANEL -->
  <main class="panel-right" id="panelRight">
    <div class="state-empty" id="emptyState">
      <div class="big-emoji">🥣</div>
      <h2>어떤 성분을 피해야 하나요?</h2>
      <p>왼쪽에서 알러지 성분을 선택하고<br>레시피 찾기를 눌러보세요.<br>안전한 맞춤 레시피를 추천해 드려요!</p>
    </div>
  </main>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="ai-badge">✨ AI 추천 레시피</div>
        <div class="modal-title" id="modalTitle"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

    nutrition:{칼로리:'92kcal',단백질:'19g',지방:'1.5g'},
    caution:'생선은 주 3회 이하로 급여하고 타우린 보충에 신경 쓰세요.'
  },
  {

    emoji:'🫐', title:'칠면조 블루베리 트릿',

    tags:['수제 간식','저알러지','그레인프리'],

    steps:['칠면조를 볶아서 식힌다.','블루베리를 으깬다.','모든 재료를 섞는다.','작은 볼로 빚어 냉장 보관한다.'],

  },
  {
    id:8, pet:'cat', type:'raw',
    emoji:'🥩', title:'토끼고기 미니 생식',

    allergens:['닭고기','소고기','참치','연어','달걀','유제품'],
    tags:['생식','저알러지','신선육'],
    ingredients:['토끼 다짐육 120g','호박 20g','연어오일 3ml','타우린 보충제'],
    steps:['재료를 해동 후 섞는다.','작은 접시에 담아 급여한다.','남은 양은 냉동 보관한다.'],

  {
    id:9, pet:'cat', type:'supplement',
    emoji:'🎃', title:'단호박 치킨프리 스프',

    allergens:['닭고기','소고기','달걀','유제품','참치','밀/글루텐'],
    tags:['영양 보충','소화 용이','스프'],
    ingredients:['단호박 80g','오리 다짐육 60g','물 150ml','올리브오일 1t'],
    steps:['단호박을 쪄서 으깬다.','오리육을 볶는다.','물과 함께 끓인다.','체에 걸러 스프 형태로 만든다.'],

  },

// ── STATE ─────────────────────────────────────────────────────
let currentPet = 'dog';
let selectedAllergens = new Set();
let selectedMeal = 'all';
let customAllergens = [];

// ── INIT ──────────────────────────────────────────────────────
function init() {
  renderAllergenChips();
}

function renderAllergenChips() {
  const list = currentPet === 'dog' ? ALLERGENS_DOG : ALLERGENS_CAT;
  const grid = document.getElementById('allergyGrid');
  grid.innerHTML = '';
  list.forEach(a => {
    const chip = document.createElement('div');
    chip.className = 'allergy-chip' + (selectedAllergens.has(a) ? ' selected' : '');
    chip.textContent = a;
    chip.onclick = () => toggleAllergen(a, chip);
    grid.appendChild(chip);
  });
  // custom allergens
  customAllergens.forEach(a => {
    const chip = document.createElement('div');
    chip.className = 'allergy-chip' + (selectedAllergens.has(a) ? ' selected' : '');
    chip.textContent = a + ' 🗑';
    chip.onclick = () => { customAllergens = customAllergens.filter(x=>x!==a); selectedAllergens.delete(a); renderAllergenChips(); updateSummary(); };
    grid.appendChild(chip);
  });
}

function toggleAllergen(name, chip) {
  if (selectedAllergens.has(name)) {
    selectedAllergens.delete(name);
    chip.classList.remove('selected');
  } else {
    selectedAllergens.add(name);
    chip.classList.add('selected');
  }
  updateSummary();
}

function updateSummary() {
  const el = document.getElementById('selectedSummary');
  if (selectedAllergens.size === 0) {
    el.textContent = '아직 선택된 성분이 없어요';
    el.classList.add('empty');
  } else {
    el.textContent = [...selectedAllergens].map(a => `🚫 ${a}`).join('  ');
    el.classList.remove('empty');
  }
}

function selectPet(pet) {
  currentPet = pet;
  document.querySelectorAll('.pet-tab').forEach(t => t.classList.toggle('active', t.dataset.pet === pet));
  selectedAllergens.clear();
  renderAllergenChips();
  updateSummary();
  resetResults();
}

function resetResults() {
  document.getElementById('panelRight').innerHTML = `
    <div class="state-empty" id="emptyState">
      <div class="big-emoji">🥣</div>
      <h2>어떤 성분을 피해야 하나요?</h2>
      <p>왼쪽에서 알러지 성분을 선택하고<br>레시피 찾기를 눌러보세요.<br>안전한 맞춤 레시피를 추천해 드려요!</p>
    </div>`;
}

function selectMeal(el) {
  document.querySelectorAll('.meal-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  selectedMeal = el.dataset.meal;
}

function addCustom() {
  const input = document.getElementById('customInput');
  const val = input.value.trim();
  if (!val) return;
  if (!customAllergens.includes(val)) {
    customAllergens.push(val);
    selectedAllergens.add(val);
  }
  input.value = '';
  renderAllergenChips();
  updateSummary();
}

// ── SEARCH ────────────────────────────────────────────────────
function doSearch() {
  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = '🔍 찾는 중...';

  const panel = document.getElementById('panelRight');
  panel.innerHTML = `<div class="state-empty"><div class="big-emoji">🍳</div><h2>맞춤 레시피 탐색 중...</h2><div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;

  setTimeout(() => {
    const results = RECIPES.filter(r => {
      if (r.pet !== currentPet) return false;
      if (selectedMeal !== 'all' && r.type !== selectedMeal) return false;
      // 알러지 성분 포함된 레시피 제외
      const blocked = [...selectedAllergens];
      for (const bl of blocked) {
        if (r.allergens.includes(bl)) return false;
      }
      return true;
    });

    renderResults(results);
    btn.disabled = false;
    btn.textContent = '🔍 레시피 찾기';
  }, 800);
}

function renderResults(results) {
  const panel = document.getElementById('panelRight');
  const petLabel = currentPet === 'dog' ? '강아지' : '고양이';
  const allergenNote = selectedAllergens.size > 0
    ? `<b>${[...selectedAllergens].join(', ')}</b> 제외`
    : '알러지 성분 미선택';

  if (results.length === 0) {
    panel.innerHTML = `
      <div class="state-empty">
        <div class="big-emoji">😿</div>
        <h2>조건에 맞는 레시피가 없어요</h2>
        <p>알러지 성분을 줄이거나 식사 유형을 '전체'로 바꾸면<br>더 많은 레시피를 찾을 수 있어요.</p>
      </div>`;
    return;
  }

  let html = `
    <div class="results-header">
      <div class="results-title">🍽 추천 레시피</div>
      <div class="results-count">${petLabel} · ${allergenNote} · ${results.length}개</div>
    </div>
    <div class="recipe-grid">
  `;

  results.forEach((r, i) => {
    const delay = i * 0.08;
    html += `
      <div class="recipe-card" style="animation-delay:${delay}s" onclick="openModal(${r.id})">
        <div class="card-emoji-band">${r.emoji}</div>
        <div class="card-body">
          <div class="card-title">${r.title}</div>
          <div class="card-desc">${r.desc}</div>
          <div class="card-tags">
            ${r.tags.map(t => `<span class="tag tag-type">${t}</span>`).join('')}
            <span class="tag tag-pet">${currentPet === 'dog' ? '🐶 강아지' : '🐱 고양이'}</span>
          </div>
          <div class="card-ingredients">
            <strong>주재료:</strong> ${r.ingredients.slice(0,3).join(', ')} ${r.ingredients.length > 3 ? '...' : ''}
          </div>
        </div>
      </div>
    `;
  });

  html += '</div>';
  panel.innerHTML = html;
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(id) {
  const r = RECIPES.find(x => x.id === id);
  if (!r) return;
  document.getElementById('modalTitle').textContent = r.emoji + ' ' + r.title;

  const body = document.getElementById('modalBody');
  body.innerHTML = `
    <div class="modal-section">
      <div class="modal-section-title">재료</div>
      <div class="ingredient-list">
        ${r.ingredients.map(i => `<span class="ing-chip">${i}</span>`).join('')}
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">만드는 방법</div>
      <ol class="steps-list">
        ${r.steps.map((s,i) => `<li><span class="step-num">${i+1}</span><span>${s}</span></li>`).join('')}
      </ol>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">영양 정보 (1회 기준)</div>
      <div class="nutrition-grid">
        ${Object.entries(r.nutrition).map(([k,v]) => `<div class="nutr-cell"><div class="nutr-val">${v}</div><div class="nutr-lbl">${k}</div></div>`).join('')}
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">주의사항</div>
      <div class="warning-box">⚠️ ${r.caution}</div>
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay') || e.target.classList.contains('modal-close')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

init();
</script>
</body>
</html>
