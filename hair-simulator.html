<script>
// ═══════════ THEME ═══════════════════════════════
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('theme-icon').textContent=t==='dark'?'☀️':'🌙';
  document.getElementById('theme-label').textContent=t==='dark'?'라이트 모드':'다크 모드';
  localStorage.setItem('theme',t);
}
function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}
applyTheme(localStorage.getItem('theme')||'light');

// ═══════════ CONFIG ═══════════════════════════════
const STYLES=[
  {id:'twoblock',label:'투블럭',icon:'💈'},
  {id:'regent',  label:'리젠트',icon:'👑'},
  {id:'sidepart',label:'가르마',icon:'〰️'},
  {id:'wolfcut', label:'울프컷',icon:'🐺'},
  {id:'pomade',  label:'포마드',icon:'✨'},
  {id:'buzz',    label:'버즈컷',icon:'⚡'},
];
const COLORS=[
  {hex:'#0d0905',label:'자연 검정'},   {hex:'#2a1408',label:'다크 브라운'},
  {hex:'#5a2d0c',label:'브라운'},       {hex:'#8b4513',label:'라이트 브라운'},
  {hex:'#b07030',label:'캐러멜'},       {hex:'#c8a040',label:'골든 블론드'},
  {hex:'#787878',label:'애쉬 그레이'}, {hex:'#c8c4bc',label:'플래티넘'},
  {hex:'#5a1020',label:'버건디'},       {hex:'#0a0a1e',label:'블루 블랙'},
];
let activeStyle='twoblock', activeColor='#0d0905', hairOpacity=0.90;

// ═══════════ BUILD UI ═════════════════════════════
const styleGrid=document.getElementById('style-grid');
STYLES.forEach(s=>{
  const btn=document.createElement('button');
  btn.className='style-btn'+(s.id===activeStyle?' active':'');
  btn.innerHTML=`<span class="icon">${s.icon}</span>${s.label}`;
  btn.addEventListener('click',()=>{
    activeStyle=s.id;
    document.querySelectorAll('.style-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  });
  styleGrid.appendChild(btn);
});
const colorGrid=document.getElementById('color-grid');
COLORS.forEach(c=>{
  const btn=document.createElement('button');
  btn.className='color-swatch'+(c.hex===activeColor?' active':'');
  btn.style.background=c.hex; btn.title=c.label;
  btn.addEventListener('click',()=>{
    activeColor=c.hex;
    document.querySelectorAll('.color-swatch').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  });
  colorGrid.appendChild(btn);
});
document.getElementById('opacity-slider').addEventListener('input',e=>{ hairOpacity=parseInt(e.target.value)/100; });

// ═══════════ CANVAS & HELPERS ═════════════════════
const canvas=document.getElementById('overlay');
const ctx=canvas.getContext('2d');
const CW=640, CH=480;

// ★ X는 반드시 (1-x) flip — CSS 미러 영상과 좌표 일치
function lp(lms,idx){ return {x:(1-lms[idx].x)*CW, y:lms[idx].y*CH}; }

function hex2rgb(h){ return {r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}; }
function hc(a){  const {r,g,b}=hex2rgb(activeColor); return `rgba(${r},${g},${b},${Math.min(a*hairOpacity,1).toFixed(2)})`; }
function hcL(a){ const {r,g,b}=hex2rgb(activeColor); const L=60; return `rgba(${Math.min(r+L,255)},${Math.min(g+L,255)},${Math.min(b+L,255)},${Math.min(a*hairOpacity,1).toFixed(2)})`; }
function hcD(a){ const {r,g,b}=hex2rgb(activeColor); const D=30; return `rgba(${Math.max(r-D,0)},${Math.max(g-D,0)},${Math.max(b-D,0)},${Math.min(a*hairOpacity,1).toFixed(2)})`; }

// 결정론적 랜덤 (프레임마다 흔들리지 않음)
function sr(i){ const s=Math.sin(i*127.1+311.7)*43758.5453; return s-Math.floor(s); }

// 단일 스트랜드
function hs(x1,y1,cpx,cpy,x2,y2,w,col){
  ctx.beginPath(); ctx.moveTo(x1,y1);
  ctx.quadraticCurveTo(cpx,cpy,x2,y2);
  ctx.lineWidth=w; ctx.strokeStyle=col; ctx.lineCap='round'; ctx.stroke();
}

// ═══════════ FACE OVAL (MediaPipe 공식 인덱스) ════
const FACE_OVAL=[
  10,338,297,332,284,251,389,356,454,323,361,288,
  397,365,379,378,400,377,152,148,176,149,150,136,
  172,58,132,93,234,127,162,21,54,103,67,109
];

// 얼굴 타원 기반 클립 패스 (위쪽 = 머리카락 공간으로 확장)
function buildHairClip(lms,geo){
  const {cx,cY,fh}=geo;
  ctx.beginPath();
  FACE_OVAL.forEach((idx,i)=>{
    const p=lp(lms,idx);
    let sx,sy;
    if(p.y<=cY+fh*0.06){
      // 이마/윗부분: 옆으로 10% 확장 + 위로 크게 올림
      sx=cx+(p.x-cx)*1.12;
      sy=p.y-fh*0.44;
    } else if(p.y<=cY+fh*0.35){
      // 관자놀이/볼 위쪽: 8% 확장, 약간 올림
      sx=cx+(p.x-cx)*1.09;
      sy=p.y-fh*0.06;
    } else {
      // 볼/턱: 5% 확장, 그대로
      sx=cx+(p.x-cx)*1.05;
      sy=p.y;
    }
    if(i===0) ctx.moveTo(sx,sy); else ctx.lineTo(sx,sy);
  });
  ctx.closePath();
}

// ═══════════ 헤드 지오메트리 추출 ════════════════
function extractGeo(lms){
  const crown    =lp(lms,10);
  const chin     =lp(lms,152);
  const leftEdge =lp(lms,234);
  const rightEdge=lp(lms,454);
  const leftEye  =lp(lms,159);
  const rightEye =lp(lms,386);
  const noseTip  =lp(lms,1);
  const leftTemple =lp(lms,127);
  const rightTemple=lp(lms,356);
  const leftBrow =lp(lms,55);
  const rightBrow=lp(lms,285);

  const cx  =(leftEdge.x+rightEdge.x)/2;
  const fw  =Math.abs(rightEdge.x-leftEdge.x);
  const fh  =chin.y-crown.y;
  const eyeY=(leftEye.y+rightEye.y)/2;

  // 좌우 회전(yaw): 코가 중심에서 얼마나 벗어났는지
  const lDist=Math.abs(noseTip.x-leftEdge.x);
  const rDist=Math.abs(noseTip.x-rightEdge.x);
  const yaw=(rDist-lDist)/(lDist+rDist); // -1(좌)~+1(우)

  // 머리 기울기(roll): 눈 각도
  const roll=Math.atan2(rightEye.y-leftEye.y, rightEye.x-leftEye.x);

  // 상하(pitch): 코와 이마/턱 거리 비교
  const tDist=Math.abs(noseTip.y-crown.y);
  const bDist=Math.abs(chin.y-noseTip.y);
  const pitch=(tDist-bDist)/(tDist+bDist);

  const hairTopY=crown.y-fh*(0.38+pitch*0.06);
  const earY    =crown.y+fh*0.50;
  // 관자놀이 기반 머리카락 좌우 경계 (볼보다 더 정확)
  const hL=leftTemple.x -fw*0.06;
  const hR=rightTemple.x+fw*0.06;

  return {
    crown,chin,leftEdge,rightEdge,leftEye,rightEye,
    noseTip,leftTemple,rightTemple,leftBrow,rightBrow,
    cx,fw,fh,eyeY,yaw,roll,pitch,
    hairTopY,earY,hL,hR,cY:crown.y
  };
}

// ═══════════ MAIN DISPATCHER ══════════════════════
function drawHair(lms){
  const geo=extractGeo(lms);
  ctx.save();

  // roll 보정: 머리 기울기에 맞춰 캔버스 회전
  if(Math.abs(geo.roll)>0.015){
    ctx.translate(geo.cx, geo.cY+geo.fh*0.15);
    ctx.rotate(geo.roll*0.55);
    ctx.translate(-geo.cx,-(geo.cY+geo.fh*0.15));
  }

  // face oval 기반 클립
  buildHairClip(lms,geo);
  ctx.clip();

  switch(activeStyle){
    case 'twoblock': drawTwoblock(geo); break;
    case 'regent':   drawRegent(geo);   break;
    case 'sidepart': drawSidepart(geo); break;
    case 'wolfcut':  drawWolfcut(geo);  break;
    case 'pomade':   drawPomade(geo);   break;
    case 'buzz':     drawBuzz(geo);     break;
  }
  ctx.restore();
}

// ═══════════ 투블럭 ═══════════════════════════════
function drawTwoblock({cx,cY,hairTopY,hL,hR,fw,fh,earY,yaw}){
  // Shadow
  ctx.save(); ctx.filter='blur(7px)';
  ctx.ellipse(cx+yaw*fw*0.05,(cY+hairTopY)/2,fw*0.45,(cY-hairTopY)*0.52,0,0,Math.PI*2);
  ctx.fillStyle=hcD(0.22); ctx.fill(); ctx.filter='none'; ctx.restore();

  // Base strands (탑)
  const n=90;
  for(let i=0;i<n;i++){
    const t=i/(n-1);
    const rx=hL+fw*0.08+t*fw*0.84;
    const ry=cY-sr(i*3)*fh*0.012;
    const ex=rx+(cx-rx)*0.06+yaw*fw*0.07+(sr(i*7)-0.5)*fw*0.05;
    const ey=hairTopY+sr(i*11)*(cY-hairTopY)*0.55;
    const cpx=rx+(ex-rx)*0.38+(sr(i*13)-0.5)*fw*0.03;
    const cpy=ry+(ey-ry)*0.32;
    hs(rx,ry,cpx,cpy,ex,ey, 0.85+sr(i*17)*1.55, hc(0.38+sr(i*19)*0.48));
  }
  // Mid strands
  for(let i=0;i<32;i++){
    const t=0.12+(i/31)*0.76;
    const rx=hL+fw*0.1+t*fw*0.80;
    const ex=rx+yaw*fw*0.06+(sr(i*23)-0.5)*fw*0.025;
    const ey=hairTopY+(cY-hairTopY)*(0.15+sr(i*29)*0.40);
    hs(rx,cY,rx+(sr(i*31)-0.5)*fw*0.018,(cY+ey)*0.48,ex,ey, 0.75+sr(i*37)*1.1, hc(0.52+sr(i*41)*0.38));
  }
  // Highlights
  for(let i=0;i<16;i++){
    const t=0.22+(i/15)*0.56;
    const rx=hL+fw*0.08+t*fw*0.84;
    hs(rx,cY,rx+(sr(i*43)-0.5)*fw*0.015,(cY+hairTopY)*0.5,rx+yaw*fw*0.04,hairTopY+fh*0.04, 0.65, hcL(0.26));
  }

  // 페이드 사이드
  for(const [sx,dir] of [[hL,1],[hR,-1]]){
    const vis=dir>0?(1+yaw*0.45):(1-yaw*0.45);
    for(let j=0;j<28;j++){
      const fy=cY+fh*0.02+j*(earY-cY-fh*0.02)/28;
      const fade=Math.pow(1-j/28,1.3)*Math.max(0.08,vis);
      for(let k=0;k<4;k++){
        const fx=sx+dir*fw*(0.006+sr(j*4+k)*0.07);
        const len=fw*0.013*fade;
        hs(fx,fy,fx+dir*len*0.5,fy-len*0.38,fx+dir*len,fy-len*0.78, 0.7, hc(0.16+fade*0.42));
      }
    }
  }
}

// ═══════════ 리젠트 ═══════════════════════════════
function drawRegent({cx,cY,hairTopY,hL,hR,fw,fh,earY,yaw,pitch,leftBrow,rightBrow}){
  const peakY=hairTopY-fh*(0.28+Math.abs(pitch)*0.05);
  const peakX=cx+yaw*fw*0.08; // 고개 돌리면 봉우리도 이동

  // Shadow
  ctx.save(); ctx.filter='blur(9px)';
  ctx.ellipse(peakX,(peakY+cY)/2,fw*0.40,(cY-peakY)*0.50,0,0,Math.PI*2);
  ctx.fillStyle=hcD(0.25); ctx.fill(); ctx.filter='none'; ctx.restore();

  // Base strands — 앞에서 위·뒤로 쓸어 넘김
  const n=95;
  for(let i=0;i<n;i++){
    const t=i/(n-1);
    const rx=hL+fw*0.07+t*fw*0.86;
    const ry=cY-sr(i*3)*fh*0.01;
    // 뒤(오른쪽)로 쓸어 넘기는 방향, yaw 반영
    const ex=rx+fw*(0.14+yaw*0.10)+sr(i*7)*fw*0.07;
    const ey=peakY+sr(i*11)*(cY-peakY)*0.45;
    const cpx=rx+fw*(0.08+yaw*0.06)+(sr(i*13)-0.5)*fw*0.03;
    const cpy=ry-(ry-ey)*0.50;
    hs(rx,ry,cpx,cpy,ex,ey, 0.9+sr(i*17)*1.6, hc(0.42+sr(i*19)*0.45));
  }
  // 앞머리 볼륨 강조
  for(let i=0;i<22;i++){
    const t=i/21;
    const rx=hL+fw*0.10+t*fw*0.55;
    const ex=rx+fw*(0.18+yaw*0.12);
    const ey=peakY+(cY-peakY)*0.28;
    hs(rx,cY,rx+fw*0.09,(cY+ey)*0.44,ex,ey, 1.1+sr(i*23)*1.4, hc(0.55+sr(i*29)*0.35));
  }
  // Highlights
  for(let i=0;i<16;i++){
    const t=0.15+(i/15)*0.60;
    const rx=hL+fw*0.08+t*fw*0.84;
    const ex=rx+fw*(0.15+yaw*0.08);
    hs(rx,cY,rx+fw*0.08,(cY+peakY)*0.46,ex,peakY+fh*0.05, 0.7, hcL(0.25));
  }
  // Shine (리젠트 특징)
  const sg=ctx.createRadialGradient(peakX-fw*0.08,peakY+fh*0.04,0,peakX,peakY+fh*0.12,fw*0.32);
  sg.addColorStop(0,`rgba(255,255,255,${0.16*hairOpacity})`);
  sg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sg; ctx.fillRect(hL,peakY,hR-hL,cY-peakY);

  // 짧은 사이드
  for(const [sx,dir] of [[hL,1],[hR,-1]]){
    const vis=dir>0?(1+yaw*0.5):(1-yaw*0.5);
    for(let j=0;j<22;j++){
      const fy=cY+j*(earY-cY)/22;
      const fade=Math.pow(1-j/22,1.2)*Math.max(0.06,vis);
      for(let k=0;k<3;k++){
        const fx=sx+dir*fw*(0.005+sr(j*3+k)*0.06);
        const len=fw*0.012*fade;
        hs(fx,fy,fx+dir*len*0.5,fy-len*0.4,fx+dir*len,fy-len*0.8, 0.7, hc(0.18+fade*0.38));
      }
    }
  }
}

// ═══════════ 가르마 ═══════════════════════════════
function drawSidepart({cx,cY,hairTopY,hL,hR,fw,fh,earY,yaw,noseTip}){
  // 가르마 위치: 코 기준으로 동적으로 결정
  const partX=noseTip.x-fw*0.08+yaw*fw*0.04;

  // Shadow
  ctx.save(); ctx.filter='blur(5px)';
  ctx.ellipse(cx,(cY+hairTopY)/2,fw*0.46,(cY-hairTopY)*0.50,0,0,Math.PI*2);
  ctx.fillStyle=hcD(0.20); ctx.fill(); ctx.filter='none'; ctx.restore();

  // 왼쪽: 왼쪽으로 쓸어 내림
  const nL=36;
  for(let i=0;i<nL;i++){
    const t=i/(nL-1);
    const rx=hL+fw*0.04+t*(partX-hL-fw*0.04);
    const ry=cY-sr(i*3)*fh*0.008;
    const ex=rx-fw*(0.04+sr(i*7)*0.09);
    const ey=hairTopY+(cY-hairTopY)*(0.22+sr(i*11)*0.55);
    const cpx=rx+(ex-rx)*0.45+(sr(i*13)-0.5)*fw*0.025;
    const cpy=ry+(ey-ry)*0.35;
    hs(rx,ry,cpx,cpy,ex,ey, 0.85+sr(i*17)*1.5, hc(0.42+sr(i*19)*0.48));
  }
  // 오른쪽: 오른쪽으로 쓸어 올림
  const nR=42;
  for(let i=0;i<nR;i++){
    const t=i/(nR-1);
    const rx=partX+fw*0.01+t*(hR-partX-fw*0.02);
    const ry=cY-sr(i*5)*fh*0.008;
    const ex=rx+fw*(0.03+sr(i*11)*0.08);
    const ey=hairTopY+(cY-hairTopY)*(0.18+sr(i*13)*0.52);
    const cpx=rx+(ex-rx)*0.45+(sr(i*7)-0.5)*fw*0.025;
    const cpy=ry+(ey-ry)*0.38;
    hs(rx,ry,cpx,cpy,ex,ey, 0.85+sr(i*19)*1.5, hc(0.42+sr(i*17)*0.48));
  }
  // Mid + Highlights
  for(let i=0;i<14;i++){
    const rx=partX+fw*0.04+i*fw*0.055;
    hs(rx,cY,rx+fw*0.03,(cY+hairTopY)*0.5,rx+fw*0.07,hairTopY+fh*0.07, 0.75, hcL(0.24));
  }

  // 가르마 선 (얇은 두피 라인)
  ctx.beginPath();
  ctx.moveTo(partX,hairTopY+fh*0.02);
  ctx.quadraticCurveTo(partX+fw*0.01,cY-fh*0.06,partX+fw*0.015,cY);
  ctx.strokeStyle=`rgba(0,0,0,${0.07*hairOpacity})`;
  ctx.lineWidth=fw*0.024; ctx.lineCap='round'; ctx.stroke();

  // 사이드
  for(const [sx,dir] of [[hL,1],[hR,-1]]){
    const vis=dir>0?(1+yaw*0.45):(1-yaw*0.45);
    for(let j=0;j<22;j++){
      const fy=cY+fh*0.01+j*(earY-cY-fh*0.01)/22;
      const fade=Math.pow(1-j/22,1.2)*Math.max(0.06,vis);
      for(let k=0;k<3;k++){
        const fx=sx+dir*fw*(0.005+sr(j*3+k)*0.055);
        const len=fw*0.011*fade;
        hs(fx,fy,fx+dir*len*0.5,fy-len*0.42,fx+dir*len,fy-len*0.78, 0.7, hc(0.18+fade*0.32));
      }
    }
  }
}

// ═══════════ 울프컷 ═══════════════════════════════
function drawWolfcut({cx,cY,hairTopY,hL,hR,fw,fh,earY,eyeY,yaw,pitch,leftTemple,rightTemple}){
  // Shadow
  ctx.save(); ctx.filter='blur(8px)';
  ctx.ellipse(cx,(cY+hairTopY)/2,fw*0.50,(cY-hairTopY)*0.56,0,0,Math.PI*2);
  ctx.fillStyle=hcD(0.22); ctx.fill(); ctx.filter='none'; ctx.restore();

  // 탑 스트랜드 (아래·앞으로 자연스럽게 내려옴)
  const n=92;
  for(let i=0;i<n;i++){
    const t=i/(n-1);
    const rx=hL+fw*0.02+t*fw*0.96;
    const ry=hairTopY-fh*0.08+sr(i*5)*fh*0.07;
    const ex=rx+(sr(i*7)-0.5)*fw*0.10+yaw*fw*0.05;
    const ey=cY-fh*0.01+sr(i*11)*fh*0.04;
    const cpx=rx+(ex-rx)*0.28+(sr(i*13)-0.5)*fw*0.06;
    const cpy=ry+(ey-ry)*0.42;
    hs(rx,ry,cpx,cpy,ex,ey, 0.85+sr(i*17)*1.55, hc(0.38+sr(i*19)*0.50));
  }

  // 커튼 앞머리 (이마 위로 떨어지는 스트랜드)
  const bang=20;
  for(let i=0;i<bang;i++){
    const t=i/(bang-1);
    const rx=hL+fw*0.14+t*fw*0.72;
    const ry=hairTopY-fh*0.06;
    const ex=rx+(cx-rx)*0.10+(sr(i*5)-0.5)*fw*0.07;
    const ey=eyeY+fh*(0.06+pitch*0.04)+sr(i*7)*fh*0.06;
    const w=1.5+sr(i*13)*2.4;
    hs(rx,ry,rx+(sr(i*11)-0.5)*fw*0.08,(ry+ey)*0.48,ex,ey, w, hc(0.50+sr(i*17)*0.38));
    hs(rx,ry,rx+(sr(i*19)-0.5)*fw*0.04,(ry+ey)*0.42,ex,ey, w*0.45, hcL(0.18));
  }

  // 긴 레이어 사이드 (울프컷 특징)
  for(const [tmpl,dir] of [[leftTemple,1],[rightTemple,-1]]){
    const sx=tmpl.x;
    const vis=dir>0?(1+yaw*0.50):(1-yaw*0.50);
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(sx+dir*fw*0.02,cY);
    ctx.bezierCurveTo(sx-dir*fw*0.06,cY+fh*0.28,sx-dir*fw*0.08,earY,sx+dir*fw*0.04,earY+fh*0.22);
    ctx.lineTo(sx+dir*fw*0.20,earY+fh*0.18);
    ctx.bezierCurveTo(sx+dir*fw*0.12,earY,sx+dir*fw*0.10,cY+fh*0.22,sx+dir*fw*0.07,cY+fh*0.02);
    ctx.closePath();
    ctx.fillStyle=hc(0.65*Math.max(0.1,vis));
    ctx.fill(); ctx.clip();
    for(let j=0;j<26;j++){
      const ry2=cY+j*(earY+fh*0.18-cY)/26;
      const rx2=sx+dir*fw*(0.03+sr(j*3)*0.09);
      const ey2=ry2+fh*0.055+sr(j*7)*fh*0.04;
      hs(rx2,ry2,rx2+dir*fw*0.01,(ry2+ey2)*0.5,rx2-dir*fw*sr(j*11)*0.03,ey2,
         0.9+sr(j*13)*1.4, hc((0.42+sr(j*17)*0.40)*Math.max(0.1,vis)));
    }
    ctx.restore();
  }
}

// ═══════════ 포마드 ═══════════════════════════════
function drawPomade({cx,cY,hairTopY,hL,hR,fw,fh,earY,yaw}){
  const flatTopY=hairTopY+fh*0.14; // 납작하고 낮은 실루엣

  // Shadow
  ctx.save(); ctx.filter='blur(5px)';
  ctx.ellipse(cx,(cY+flatTopY)/2,fw*0.44,(cY-flatTopY)*0.50,0,0,Math.PI*2);
  ctx.fillStyle=hcD(0.20); ctx.fill(); ctx.filter='none'; ctx.restore();

  // Base strands — 완전히 뒤로 쓸어 넘김 (수평에 가까운 흐름)
  const n=100;
  for(let i=0;i<n;i++){
    const t=i/(n-1);
    const rx=hL+fw*0.07+t*fw*0.86;
    const ry=cY-sr(i*3)*fh*0.01;
    const ex=rx+fw*(0.12+yaw*0.10+sr(i*7)*0.10);
    const ey=flatTopY+sr(i*11)*(cY-flatTopY)*0.62;
    const cpx=rx+fw*0.07+(sr(i*13)-0.5)*fw*0.02;
    const cpy=ry+(ey-ry)*0.25;
    hs(rx,ry,cpx,cpy,ex,ey, 0.85+sr(i*17)*1.45, hc(0.48+sr(i*19)*0.42));
  }
  // Mid
  for(let i=0;i<28;i++){
    const t=0.1+(i/27)*0.80;
    const rx=hL+fw*0.08+t*fw*0.84;
    const ex=rx+fw*(0.10+yaw*0.08)+sr(i*23)*fw*0.06;
    const ey=flatTopY+(cY-flatTopY)*(0.25+sr(i*29)*0.45);
    hs(rx,cY,rx+fw*0.05,(cY+ey)*0.46,ex,ey, 0.75+sr(i*31)*1.0, hc(0.55+sr(i*37)*0.36));
  }

  // 광택 그라디언트 (포마드 특징)
  const sg=ctx.createRadialGradient(cx-fw*0.10,flatTopY+fh*0.06,0,cx,flatTopY+fh*0.16,fw*0.35);
  sg.addColorStop(0,`rgba(255,255,255,${0.20*hairOpacity})`);
  sg.addColorStop(0.5,`rgba(255,255,255,${0.08*hairOpacity})`);
  sg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sg; ctx.fillRect(hL,flatTopY,hR-hL,cY-flatTopY);

  // 사이드
  for(const [sx,dir] of [[hL,1],[hR,-1]]){
    const vis=dir>0?(1+yaw*0.50):(1-yaw*0.50);
    for(let j=0;j<24;j++){
      const fy=cY+j*(earY-cY)/24;
      const fade=Math.pow(1-j/24,1.3)*Math.max(0.06,vis);
      for(let k=0;k<3;k++){
        const fx=sx+dir*fw*(0.006+sr(j*3+k)*0.06);
        const len=fw*0.012*fade;
        hs(fx,fy,fx+dir*len*0.6,fy-len*0.3,fx+dir*len*1.2,fy-len*0.6, 0.7, hc(0.20+fade*0.36));
      }
    }
  }
}

// ═══════════ 버즈컷 ═══════════════════════════════
function drawBuzz({cx,cY,hairTopY,hL,hR,fw,fh,earY,yaw}){
  const buzzTopY=hairTopY+fh*0.24;

  // 얇은 베이스
  ctx.save(); ctx.filter='blur(1.5px)';
  ctx.beginPath();
  ctx.ellipse(cx,(cY+buzzTopY)/2,fw*0.48,(cY-buzzTopY)*0.48,0,0,Math.PI*2);
  ctx.fillStyle=hc(0.48); ctx.fill(); ctx.filter='none'; ctx.restore();

  // 촘촘한 틱 마크 (두피 전체)
  const ticks=170;
  for(let i=0;i<ticks;i++){
    // 두피 영역 내 분포
    const bx=cx+(sr(i*3)-0.5)*fw*0.90;
    const by=buzzTopY+sr(i*7)*(earY-buzzTopY)*0.85;

    // 타원 범위 체크 (head-oval 안에만 그림)
    const relX=(bx-cx)/(fw*0.50);
    const relY=(by-(buzzTopY+cY)/2)/((cY-buzzTopY)*0.52);
    if(relX*relX+relY*relY>1.0) continue;

    // yaw 반영: 먼쪽은 더 연하게
    const sideAlpha=bx<cx?(1+yaw*0.45):(1-yaw*0.45);
    const alpha=(0.30+sr(i*11)*0.45)*Math.max(0.06,sideAlpha);

    const len=fw*(0.009+sr(i*13)*0.007);
    const angle=-Math.PI/2+(sr(i*17)-0.5)*0.75;
    hs(bx,by,bx+Math.cos(angle)*len*0.5,by+Math.sin(angle)*len*0.5,
       bx+Math.cos(angle)*len,by+Math.sin(angle)*len, 0.7+sr(i*19)*0.4, hc(alpha));
  }

  // 사이드 스터블
  for(const [sx,dir] of [[hL,1],[hR,-1]]){
    const vis=dir>0?(1+yaw*0.50):(1-yaw*0.50);
    for(let j=0;j<30;j++){
      const fy=cY+j*(earY-cY)/30;
      const fade=Math.pow(1-j/30,1.2)*Math.max(0.05,vis);
      for(let k=0;k<4;k++){
        const fx=sx+dir*fw*(0.004+sr(j*4+k)*0.09);
        const len=fw*0.009*fade;
        hs(fx,fy,fx,fy-len*0.5,fx,fy-len, 0.65, hc(0.18+fade*0.38));
      }
    }
  }
}

// ═══════════ MEDIAPIPE ════════════════════════════
const statusEl =document.getElementById('status');
const loadingEl=document.getElementById('loading');
const loadMsgEl=document.getElementById('loading-msg');
const videoEl  =document.getElementById('cam');

const faceMesh=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({maxNumFaces:1,refineLandmarks:false,minDetectionConfidence:0.5,minTrackingConfidence:0.5});

faceMesh.onResults(results=>{
  ctx.clearRect(0,0,CW,CH);
  if(results.multiFaceLandmarks&&results.multiFaceLandmarks.length>0){
    statusEl.textContent='얼굴 인식 중 ✓';
    drawHair(results.multiFaceLandmarks[0]);
  } else {
    statusEl.textContent='얼굴을 카메라 중앙에 맞춰주세요';
  }
});

const camera=new Camera(videoEl,{
  onFrame:async()=>{ await faceMesh.send({image:videoEl}); },
  width:640,height:480
});
camera.start()
  .then(()=>{ loadingEl.classList.add('hidden'); statusEl.textContent='카메라 연결됨 — 얼굴을 맞춰주세요'; })
  .catch(err=>{ loadMsgEl.textContent='카메라 접근 실패: '+err.message; document.querySelector('.spinner').style.display='none'; });
</script>
