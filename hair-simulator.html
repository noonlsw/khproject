    :root[data-theme="light"] {
      --bg: #f3f4f6; --panel-bg: #ffffff; --text: #111827; --subtext: #6b7280;
      --border: #e5e7eb; --btn-bg: #f9fafb; --btn-hover: #eff6ff;

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; min-height: 100vh; transition: background .3s, color .3s; }

    footer { background: var(--panel-bg); border-top: 1px solid var(--border); padding: 28px 20px; text-align: center; margin-top: 8px; }
    .footer-links { display: flex; justify-content: center; gap: 18px; flex-wrap: wrap; margin-bottom: 10px; }
    .footer-links a { text-decoration: none; font-size: 13px; color: var(--subtext); transition: color .2s; }
    .footer-links a:hover { color: #2563eb; }
    .footer-copy { font-size: 12px; color: var(--subtext); }
    .theme-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border: 1px solid var(--border); border-radius: 20px; background: var(--toggle-bg); color: var(--text); cursor: pointer; font-size: 13px; transition: opacity .2s; }

    .main { display: flex; gap: 20px; padding: 20px; max-width: 1050px; margin: 0 auto; }

    .viewer-wrap { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 24px var(--shadow); }
    #cam { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

    #loading { position: absolute; inset: 0; background: rgba(0,0,0,.72); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-size: 15px; gap: 14px; border-radius: 16px; z-index: 10; }
    #loading.hidden { display: none; }
    .spinner { width: 36px; height: 36px; border: 4px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-bar { margin-top: 10px; text-align: center; font-size: 13px; color: var(--subtext); height: 18px; }
    .sidebar { width: 250px; display: flex; flex-direction: column; gap: 16px; }

    .panel-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--subtext); margin-bottom: 12px; }
    .style-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .style-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 6px; border: 2px solid var(--border); border-radius: 12px; background: var(--btn-bg); color: var(--text); cursor: pointer; font-size: 12px; font-weight: 600; transition: border-color .2s, background .2s, color .2s; }
    .style-btn:hover { border-color: var(--btn-active); background: var(--btn-hover); }

    .color-swatch:hover { transform: scale(1.18); }
    .color-swatch.active { box-shadow: 0 0 0 2px var(--panel-bg), 0 0 0 4px var(--btn-active); }
    .slider-row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }

    @media (max-width: 680px) { .main { flex-direction: column; } .sidebar { width: 100%; } }

<div class="main">

<script>
// ── Theme ────────────────────────────────
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-icon').textContent  = t==='dark' ? '☀️' : '🌙';
  document.getElementById('theme-label').textContent = t==='dark' ? '라이트 모드' : '다크 모드';
  localStorage.setItem('theme', t);
}
function toggleTheme() { applyTheme(document.documentElement.getAttribute('data-theme')==='dark' ? 'light' : 'dark'); }
applyTheme(localStorage.getItem('theme') || 'light');

// ── Config ───────────────────────────────
const STYLES = [
  { id:'twoblock', label:'투블럭', icon:'💈' },
  { id:'regent',   label:'리젠트', icon:'👑' },
  { id:'sidepart', label:'가르마', icon:'〰️' },
  { id:'wolfcut',  label:'울프컷', icon:'🐺' },
  { id:'pomade',   label:'포마드', icon:'✨' },
  { id:'buzz',     label:'버즈컷', icon:'⚡' },
];
const COLORS = [
  { hex:'#0d0905', label:'자연 검정'    },
  { hex:'#2a1408', label:'다크 브라운'  },
  { hex:'#5a2d0c', label:'브라운'       },
  { hex:'#8b4513', label:'라이트 브라운'},
  { hex:'#b07030', label:'캐러멜'       },
  { hex:'#c8a040', label:'골든 블론드'  },
  { hex:'#787878', label:'애쉬 그레이'  },
  { hex:'#c8c4bc', label:'플래티넘'     },
  { hex:'#5a1020', label:'버건디'       },
  { hex:'#0a0a1e', label:'블루 블랙'    },
];

let activeStyle = 'twoblock';
let activeColor = '#0d0905';
let hairOpacity = 0.90;

// ── Build UI ─────────────────────────────
const styleGrid = document.getElementById('style-grid');
STYLES.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'style-btn' + (s.id===activeStyle ? ' active' : '');
  btn.innerHTML = `<span class="icon">${s.icon}</span>${s.label}`;
  btn.addEventListener('click', () => {
    activeStyle = s.id;
    document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
  styleGrid.appendChild(btn);
});

const colorGrid = document.getElementById('color-grid');
COLORS.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'color-swatch' + (c.hex===activeColor ? ' active' : '');
  btn.style.background = c.hex;
  btn.title = c.label;
  btn.addEventListener('click', () => {
    activeColor = c.hex;
    document.querySelectorAll('.color-swatch').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
  colorGrid.appendChild(btn);
});

document.getElementById('opacity-slider').addEventListener('input', e => {
  hairOpacity = parseInt(e.target.value) / 100;
});

// ── Canvas helpers ───────────────────────
const canvas = document.getElementById('overlay');
const ctx    = canvas.getContext('2d');
const CW = 640, CH = 480;

// ★ X는 반드시 (1 - x) 로 flip — CSS 미러된 영상과 일치시키기 위해
function lp(lms, idx) {
  return { x: (1 - lms[idx].x) * CW, y: lms[idx].y * CH };
}

function hex2rgb(h) {
  return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) };
}
function hc(alpha) {          // hair color rgba
  const {r,g,b} = hex2rgb(activeColor);
  return `rgba(${r},${g},${b},${Math.min(alpha * hairOpacity, 1).toFixed(2)})`;
}
function hcLight(alpha) {     // lighter hair color for highlights
  const {r,g,b} = hex2rgb(activeColor);
  const L = 55;
  return `rgba(${Math.min(r+L,255)},${Math.min(g+L,255)},${Math.min(b+L,255)},${Math.min(alpha*hairOpacity,1).toFixed(2)})`;
}

// Deterministic "random" — same value every frame, no flickering
function sr(i) {
  const s = Math.sin(i * 127.1 + 311.7) * 43758.5453;
  return s - Math.floor(s);
}

// Draw a single curved hair strand
function strand(x1, y1, cpx, cpy, x2, y2, w, col) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.quadraticCurveTo(cpx, cpy, x2, y2);
  ctx.lineWidth = w;
  ctx.strokeStyle = col;
  ctx.lineCap = 'round';
  ctx.stroke();
}

// ── Clip helpers ─────────────────────────
function clipEllipse(cx, cy, rx, ry) {
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  ctx.clip();
}

// ── Main draw dispatcher ─────────────────
function drawHair(lms) {
  const crown = lp(lms, 10);    // forehead top-center
  const lEdge = lp(lms, 234);   // left face edge  (after flip)
  const rEdge = lp(lms, 454);   // right face edge (after flip)
  const chin  = lp(lms, 152);

  const cx   = (lEdge.x + rEdge.x) / 2;
  const fw   = Math.abs(rEdge.x - lEdge.x);   // face width
  const fh   = chin.y - crown.y;               // face height
  const lift = fh * 0.38;                      // how far hair extends above crown
  const topY = crown.y - lift;
  const hL   = cx - fw * 0.56;
  const hR   = cx + fw * 0.56;
  const earY = crown.y + fh * 0.50;

  ctx.save();
  switch (activeStyle) {
    case 'twoblock': drawTwoblock(cx, crown.y, topY, hL, hR, fw, fh, earY); break;
    case 'regent':   drawRegent  (cx, crown.y, topY, hL, hR, fw, fh, earY); break;
    case 'sidepart': drawSidepart(cx, crown.y, topY, hL, hR, fw, fh, earY); break;
    case 'wolfcut':  drawWolfcut (cx, crown.y, topY, hL, hR, fw, fh, earY); break;
    case 'pomade':   drawPomade  (cx, crown.y, topY, hL, hR, fw, fh, earY); break;
    case 'buzz':     drawBuzz    (cx, crown.y, topY, hL, hR, fw, fh, earY); break;
  }
  ctx.restore();
}

// ── 투블럭 ───────────────────────────────
function drawTwoblock(cx, cY, topY, hL, hR, fw, fh, earY) {
  const midY = (cY + topY) / 2;

  // 1) 기본 실루엣
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(hL + fw*0.07, cY);
  ctx.bezierCurveTo(hL+fw*0.03, topY+fh*0.05, cx-fw*0.25, topY-fh*0.05, cx, topY-fh*0.07);
  ctx.bezierCurveTo(cx+fw*0.25, topY-fh*0.05, hR-fw*0.03, topY+fh*0.05, hR-fw*0.07, cY);
  ctx.quadraticCurveTo(cx, cY+fh*0.01, hL+fw*0.07, cY);
  ctx.closePath();
  ctx.fillStyle = hc(0.85);
  ctx.fill();
  ctx.clip();

  // 2) 모발 스트랜드 (위쪽 방향)
  const n = 52;
  for (let i = 0; i < n; i++) {
    const t  = i / (n - 1);
    const rx = hL + fw*0.07 + t * fw*0.86;
    const ry = cY - sr(i*3)*fh*0.01;
    const ex = rx + (cx - rx) * 0.08 + (sr(i*7)-0.5)*fw*0.04;
    const ey = topY + sr(i*11)*(cY-topY)*0.5;
    const cpx = rx + (ex-rx)*0.4 + (sr(i*13)-0.5)*fw*0.03;
    const cpy = ry + (ey-ry)*0.4;
    const a = 0.45 + sr(i*17)*0.45;
    const w = 1.0 + sr(i*19)*1.6;
    strand(rx, ry, cpx, cpy, ex, ey, w, hc(a));
  }

  // 3) 하이라이트
  for (let i = 0; i < 14; i++) {
    const t  = 0.25 + (i/(13))*0.5;
    const rx = hL + fw*0.07 + t * fw*0.86;
    const ry = cY;
    const ey = topY + (cY-topY)*0.35;
    strand(rx, ry, rx+(sr(i*5)-0.5)*fw*0.02, (ry+ey)/2, rx+(sr(i*7)-0.5)*fw*0.02, ey, 0.8, hcLight(0.30));
  }
  ctx.restore();

  // 4) 양 옆 짧은 페이드
  for (const [sx, dir] of [[hL, 1], [hR, -1]]) {
    const rows = 22;
    for (let j = 0; j < rows; j++) {
      const fy = cY + fh*0.02 + j*(earY - cY - fh*0.02)/rows;
      const fade = 1 - j/rows;
      for (let k = 0; k < 3; k++) {
        const fx = sx + dir*fw*(0.01 + sr(j*3+k)*0.07);
        const len = fw * 0.012 * fade;
        strand(fx, fy, fx+dir*len*0.5, fy-len*0.3, fx+dir*len, fy-len*0.6, 0.7, hc(0.25 + fade*0.35));
      }
    }
  }
}

// ── 리젠트 ───────────────────────────────
function drawRegent(cx, cY, topY, hL, hR, fw, fh, earY) {
  const peakY = topY - fh * 0.42; // 더 높은 볼륨

  // 1) 기본 실루엣 (앞쪽에 볼륨)
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(hL+fw*0.06, cY);
  ctx.bezierCurveTo(hL-fw*0.04, topY-fh*0.10, cx-fw*0.30, peakY, cx, peakY-fh*0.05);
  ctx.bezierCurveTo(cx+fw*0.30, peakY, hR+fw*0.04, topY-fh*0.10, hR-fw*0.06, cY);
  ctx.quadraticCurveTo(cx, cY+fh*0.01, hL+fw*0.06, cY);
  ctx.closePath();
  ctx.fillStyle = hc(0.88);
  ctx.fill();
  ctx.clip();

  // 2) 뒤로 쓸어 넘기는 스트랜드
  const n = 50;
  for (let i = 0; i < n; i++) {
    const t  = i / (n-1);
    // 앞(왼쪽)에서 시작해 위로 쓸어 넘기는 방향
    const rx = hL + fw*0.07 + t*fw*0.86;
    const ry = cY - sr(i*3)*fh*0.01;
    // 끝점: 오른쪽 상단 방향으로
    const ex = rx + fw*0.10 + sr(i*7)*fw*0.06;
    const ey = peakY + sr(i*11)*(cY-peakY)*0.45;
    const cpx = rx + fw*0.07 + (sr(i*13)-0.5)*fw*0.03;
    const cpy = ry - (ry-ey)*0.55;
    const a = 0.5 + sr(i*17)*0.40;
    strand(rx, ry, cpx, cpy, ex, ey, 1.0+sr(i*19)*1.8, hc(a));
  }
  // 3) 앞 볼륨 강조
  for (let i = 0; i < 18; i++) {
    const rx = hL + fw*0.08 + i*fw*0.06;
    const ry = cY;
    const ex = rx + fw*0.15;
    const ey = peakY + (cY-peakY)*0.3;
    strand(rx, ry, (rx+ex)/2, (ry+ey)*0.45, ex, ey, 1.2, hcLight(0.28));
  }
  ctx.restore();

  // 4) 짧은 사이드
  for (const [sx, dir] of [[hL, 1], [hR, -1]]) {
    for (let j = 0; j < 20; j++) {
      const fy = cY + j*(earY-cY)/20;
      const fade = 1 - j/20;
      for (let k = 0; k < 3; k++) {
        const fx = sx + dir*fw*(0.01 + sr(j*3+k)*0.06);
        const len = fw*0.012*fade;
        strand(fx, fy, fx+dir*len*0.5, fy-len*0.4, fx+dir*len, fy-len*0.8, 0.7, hc(0.22+fade*0.35));
      }
    }
  }
}

// ── 가르마 ───────────────────────────────
function drawSidepart(cx, cY, topY, hL, hR, fw, fh, earY) {
  const partX = cx - fw * 0.10; // 가르마 위치

  // 1) 기본 실루엣
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(hL, cY);
  ctx.bezierCurveTo(hL-fw*0.02, topY+fh*0.06, cx-fw*0.12, topY-fh*0.06, cx, topY-fh*0.08);
  ctx.bezierCurveTo(cx+fw*0.12, topY-fh*0.06, hR+fw*0.02, topY+fh*0.06, hR, cY);
  ctx.quadraticCurveTo(cx, cY+fh*0.01, hL, cY);
  ctx.closePath();
  ctx.fillStyle = hc(0.82);
  ctx.fill();
  ctx.clip();

  // 2) 가르마 왼쪽: 왼쪽으로 쓸어 내리는 스트랜드
  const nL = 30;
  for (let i = 0; i < nL; i++) {
    const t  = i / (nL-1);
    const rx = hL + fw*0.04 + t*(partX - hL - fw*0.04);
    const ry = cY - sr(i*3)*fh*0.005;
    const ex = rx - fw*(0.04 + sr(i*7)*0.08);
    const ey = topY + (cY-topY)*(0.25 + sr(i*11)*0.55);
    strand(rx, ry, rx+(ex-rx)*0.5+(sr(i*13)-0.5)*fw*0.02, ry+(ey-ry)*0.4, ex, ey,
           0.9+sr(i*17)*1.5, hc(0.45+sr(i*19)*0.45));
  }

  // 3) 가르마 오른쪽: 오른쪽으로 쓸어 내리는 스트랜드
  const nR = 34;
  for (let i = 0; i < nR; i++) {
    const t  = i / (nR-1);
    const rx = partX + fw*0.01 + t*(hR - partX - fw*0.01);
    const ry = cY - sr(i*5)*fh*0.005;
    const ex = rx + fw*(0.03 + sr(i*11)*0.07);
    const ey = topY + (cY-topY)*(0.20 + sr(i*13)*0.55);
    strand(rx, ry, rx+(ex-rx)*0.5+(sr(i*7)-0.5)*fw*0.02, ry+(ey-ry)*0.4, ex, ey,
           0.9+sr(i*19)*1.5, hc(0.45+sr(i*17)*0.45));
  }

  // 4) 하이라이트
  for (let i = 0; i < 12; i++) {
    const rx = partX + fw*0.04 + i*fw*0.06;
    strand(rx, cY, rx+fw*0.03, (cY+topY)*0.5, rx+fw*0.06, topY+fh*0.08, 0.8, hcLight(0.25));
  }
  ctx.restore();

  // 5) 가르마 선
  ctx.beginPath();
  ctx.moveTo(partX, topY - fh*0.01);
  ctx.quadraticCurveTo(partX+fw*0.01, cY-fh*0.08, partX+fw*0.015, cY);
  ctx.strokeStyle = `rgba(0,0,0,${0.06*hairOpacity})`;
  ctx.lineWidth = fw*0.022;
  ctx.lineCap = 'round';
  ctx.stroke();

  // 6) 사이드
  for (const [sx, dir] of [[hL, 1], [hR, -1]]) {
    for (let j = 0; j < 18; j++) {
      const fy = cY + fh*0.01 + j*(earY-cY-fh*0.01)/18;
      const fade = 1 - j/18;
      for (let k = 0; k < 3; k++) {
        const fx = sx + dir*fw*(0.005 + sr(j*3+k)*0.055);
        const len = fw*0.011*fade;
        strand(fx, fy, fx+dir*len*0.5, fy-len*0.4, fx+dir*len, fy-len*0.7, 0.7, hc(0.2+fade*0.30));
      }
    }
  }
}

// ── 울프컷 ───────────────────────────────
function drawWolfcut(cx, cY, topY, hL, hR, fw, fh, earY) {
  // 1) 넓은 기본 실루엣
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(hL-fw*0.02, cY+fh*0.04);
  ctx.bezierCurveTo(hL-fw*0.08, topY+fh*0.04, cx-fw*0.35, topY-fh*0.18, cx, topY-fh*0.22);
  ctx.bezierCurveTo(cx+fw*0.35, topY-fh*0.18, hR+fw*0.08, topY+fh*0.04, hR+fw*0.02, cY+fh*0.04);
  ctx.quadraticCurveTo(cx, cY+fh*0.10, hL-fw*0.02, cY+fh*0.04);
  ctx.closePath();
  ctx.fillStyle = hc(0.88);
  ctx.fill();
  ctx.clip();

  // 2) 탑 스트랜드 (아래로 살짝 떨어지는 커튼 느낌)
  const n = 48;
  for (let i = 0; i < n; i++) {
    const t  = i / (n-1);
    const rx = hL + fw*0.02 + t*fw*0.96;
    const ry = topY - fh*0.12 + sr(i*5)*fh*0.08;
    const ex = rx + (sr(i*7)-0.5)*fw*0.10;
    const ey = cY - fh*0.01 + sr(i*11)*fh*0.04;
    const cpx = rx + (ex-rx)*0.3 + (sr(i*13)-0.5)*fw*0.06;
    const cpy = ry + (ey-ry)*0.45;
    strand(rx, ry, cpx, cpy, ex, ey, 0.9+sr(i*17)*1.6, hc(0.40+sr(i*19)*0.50));
  }
  ctx.restore();

  // 3) 커튼 앞머리 (이마 위로 내려오는 스트랜드)
  const bang = 16;
  for (let i = 0; i < bang; i++) {
    const t  = i / (bang-1);
    const rx = hL + fw*0.15 + t*fw*0.70;
    const ry = topY - fh*0.08;
    const ex = rx + (cx-rx)*0.12 + (sr(i*5)-0.5)*fw*0.06;
    const ey = cY + fh*0.08 + sr(i*7)*fh*0.06;
    const w  = 1.6 + sr(i*13)*2.2;
    strand(rx, ry, rx+(sr(i*11)-0.5)*fw*0.08, (ry+ey)*0.5, ex, ey, w, hc(0.55+sr(i*17)*0.35));
    strand(rx, ry, rx+(sr(i*19)-0.5)*fw*0.04, (ry+ey)*0.4, ex, ey, w*0.5, hcLight(0.20));
  }

  // 4) 긴 사이드 (울프컷 특징: 귀 아래까지 내려오는 레이어)
  for (const [sx, dir] of [[hL, 1], [hR, -1]]) {
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(sx+dir*fw*0.02, cY);
    ctx.bezierCurveTo(sx-dir*fw*0.06, cY+fh*0.25, sx-dir*fw*0.08, earY+fh*0.05, sx+dir*fw*0.04, earY+fh*0.20);
    ctx.lineTo(sx+dir*fw*0.18, earY+fh*0.16);
    ctx.bezierCurveTo(sx+dir*fw*0.12, earY, sx+dir*fw*0.10, cY+fh*0.22, sx+dir*fw*0.07, cY+fh*0.02);
    ctx.closePath();
    ctx.fillStyle = hc(0.72);
    ctx.fill();
    ctx.clip();

    for (let j = 0; j < 22; j++) {
      const ry = cY + j*(earY+fh*0.18-cY)/22;
      const rx = sx + dir*fw*(0.03 + sr(j*3)*0.08);
      const ey = ry + fh*0.05 + sr(j*7)*fh*0.04;
      const ex = rx - dir*fw*(sr(j*11)*0.04);
      strand(rx, ry, rx+dir*fw*0.01, (ry+ey)*0.5, ex, ey, 1.0+sr(j*13)*1.4, hc(0.45+sr(j*17)*0.40));
    }
    ctx.restore();
  }
}

// ── 포마드 ───────────────────────────────
function drawPomade(cx, cY, topY, hL, hR, fw, fh, earY) {
  // 낮고 납작한 실루엣
  const flatTopY = topY + fh*0.12;

  // 1) 기본 실루엣
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(hL+fw*0.06, cY);
  ctx.bezierCurveTo(hL+fw*0.02, flatTopY+fh*0.04, cx-fw*0.22, flatTopY-fh*0.04, cx, flatTopY-fh*0.06);
  ctx.bezierCurveTo(cx+fw*0.22, flatTopY-fh*0.04, hR-fw*0.02, flatTopY+fh*0.04, hR-fw*0.06, cY);
  ctx.quadraticCurveTo(cx, cY+fh*0.01, hL+fw*0.06, cY);
  ctx.closePath();
  ctx.fillStyle = hc(0.92);
  ctx.fill();
  ctx.clip();

  // 2) 완전히 뒤로 넘기는 스트랜드
  const n = 56;
  for (let i = 0; i < n; i++) {
    const t  = i / (n-1);
    const rx = hL + fw*0.07 + t*fw*0.86;
    const ry = cY - sr(i*3)*fh*0.01;
    // 끝점: 거의 수평으로 뒤쪽(오른쪽)으로
    const ex = rx + fw*(0.10 + sr(i*7)*0.12);
    const ey = flatTopY + sr(i*11)*(cY-flatTopY)*0.6;
    const cpx = rx + fw*0.06;
    const cpy = ry + (ey-ry)*0.3;
    strand(rx, ry, cpx, cpy, ex, ey, 0.9+sr(i*17)*1.5, hc(0.50+sr(i*19)*0.40));
  }

  // 3) 광택 하이라이트 (포마드 특징)
  const shineGrad = ctx.createLinearGradient(hL+fw*0.2, flatTopY, hR-fw*0.2, cY);
  shineGrad.addColorStop(0, 'rgba(255,255,255,0)');
  shineGrad.addColorStop(0.35, `rgba(255,255,255,${0.14*hairOpacity})`);
  shineGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.moveTo(hL+fw*0.06, cY);
  ctx.bezierCurveTo(hL+fw*0.02, flatTopY+fh*0.04, cx-fw*0.22, flatTopY-fh*0.04, cx, flatTopY-fh*0.06);
  ctx.bezierCurveTo(cx+fw*0.22, flatTopY-fh*0.04, hR-fw*0.02, flatTopY+fh*0.04, hR-fw*0.06, cY);
  ctx.quadraticCurveTo(cx, cY+fh*0.01, hL+fw*0.06, cY);
  ctx.fillStyle = shineGrad;
  ctx.fill();
  ctx.restore();

  // 4) 짧은 사이드
  for (const [sx, dir] of [[hL, 1], [hR, -1]]) {
    for (let j = 0; j < 20; j++) {
      const fy = cY + j*(earY-cY)/20;
      const fade = 1 - j/20;
      for (let k = 0; k < 3; k++) {
        const fx = sx + dir*fw*(0.01 + sr(j*3+k)*0.06);
        const len = fw*0.012*fade;
        strand(fx, fy, fx+dir*len*0.6, fy-len*0.3, fx+dir*len*1.2, fy-len*0.6, 0.7, hc(0.22+fade*0.32));
      }
    }
  }
}

// ── 버즈컷 ───────────────────────────────
function drawBuzz(cx, cY, topY, hL, hR, fw, fh, earY) {
  // 아주 얇은 실루엣
  const buzzTop = topY + fh*0.22;

  // 1) 얇은 기본 레이어
  ctx.beginPath();
  ctx.moveTo(hL, cY+fh*0.02);
  ctx.bezierCurveTo(hL-fw*0.02, buzzTop+fh*0.06, cx-fw*0.06, buzzTop, cx, buzzTop-fh*0.02);
  ctx.bezierCurveTo(cx+fw*0.06, buzzTop, hR+fw*0.02, buzzTop+fh*0.06, hR, cY+fh*0.02);
  ctx.quadraticCurveTo(cx, cY+fh*0.04, hL, cY+fh*0.02);
  ctx.fillStyle = hc(0.55);
  ctx.fill();

  // 2) 촘촘한 짧은 틱 마크 (두피 전체)
  const ticks = 80;
  for (let i = 0; i < ticks; i++) {
    const angle = (i / ticks) * Math.PI;
    const rx_n  = fw * 0.50 * (0.5 + sr(i*3)*0.5);
    const bx    = cx + Math.cos(Math.PI - angle) * rx_n;
    const by    = buzzTop + (cY - buzzTop) * (0.1 + sr(i*7)*0.85);
    const len   = fw * (0.010 + sr(i*11)*0.008);
    const tAngle= -Math.PI/2 + (sr(i*13)-0.5)*0.6;
    strand(bx, by, bx+Math.cos(tAngle)*len*0.5, by+Math.sin(tAngle)*len*0.5,
           bx+Math.cos(tAngle)*len, by+Math.sin(tAngle)*len,
           0.75, hc(0.38+sr(i*17)*0.40));
  }

  // 3) 사이드 스터블
  for (const [sx, dir] of [[hL, 1], [hR, -1]]) {
    for (let j = 0; j < 25; j++) {
      const fy = cY + j*(earY-cY)/25;
      const fade = 1 - j/25;
      for (let k = 0; k < 4; k++) {
        const fx = sx + dir*fw*(0.005 + sr(j*4+k)*0.09);
        const len = fw*0.009*fade;
        strand(fx, fy, fx, fy-len*0.5, fx, fy-len, 0.7, hc(0.20+fade*0.35));
      }
    }
  }
}

// ── MediaPipe ────────────────────────────
const statusEl  = document.getElementById('status');
const loadingEl = document.getElementById('loading');
const loadMsgEl = document.getElementById('loading-msg');
const videoEl   = document.getElementById('cam');

const faceMesh = new FaceMesh({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
});
faceMesh.setOptions({ maxNumFaces:1, refineLandmarks:false, minDetectionConfidence:0.5, minTrackingConfidence:0.5 });

faceMesh.onResults(results => {
  ctx.clearRect(0, 0, CW, CH);
  if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
    statusEl.textContent = '얼굴 인식 중 ✓';
    drawHair(results.multiFaceLandmarks[0]);
  } else {
    statusEl.textContent = '얼굴을 카메라 중앙에 맞춰주세요';
  }
});

const camera = new Camera(videoEl, {
  onFrame: async () => { await faceMesh.send({ image: videoEl }); },
  width: 640, height: 480
});

camera.start()
  .then(() => { loadingEl.classList.add('hidden'); statusEl.textContent = '카메라 연결됨 — 얼굴을 맞춰주세요'; })
  .catch(err => { loadMsgEl.textContent = '카메라 접근 실패: ' + err.message; document.querySelector('.spinner').style.display='none'; });
</script>
