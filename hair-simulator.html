<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>남성 헤어스타일 시뮬레이터</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <style>
    :root[data-theme="light"] {
      --bg: #f3f4f6;
      --panel-bg: #ffffff;
      --text: #111827;
      --subtext: #6b7280;
      --border: #e5e7eb;
      --btn-bg: #f9fafb;
      --btn-hover: #eff6ff;
      --btn-active: #2563eb;
      --btn-active-text: #ffffff;
      --toggle-bg: #e5e7eb;
      --shadow: rgba(0,0,0,0.08);
    }
    :root[data-theme="dark"] {
      --bg: #111827;
      --panel-bg: #1f2937;
      --text: #f9fafb;
      --subtext: #9ca3af;
      --border: #374151;
      --btn-bg: #374151;
      --btn-hover: #2d3748;
      --btn-active: #3b82f6;
      --btn-active-text: #ffffff;
      --toggle-bg: #374151;
      --shadow: rgba(0,0,0,0.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      background: var(--panel-bg);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 8px var(--shadow);
    }
    header h1 { font-size: 18px; font-weight: 700; }

    .theme-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--toggle-bg);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      transition: opacity 0.2s;
    }
    .theme-btn:hover { opacity: 0.8; }

    /* ── Layout ── */
    .main {
      display: flex;
      gap: 20px;
      padding: 20px;
      max-width: 1050px;
      margin: 0 auto;
    }

    /* ── Camera / Canvas ── */
    .cam-section { flex: 1; }

    .viewer-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px var(--shadow);
    }

    #cam {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Loading overlay */
    #loading {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 15px;
      gap: 14px;
      border-radius: 16px;
      z-index: 10;
    }
    #loading.hidden { display: none; }

    .spinner {
      width: 36px; height: 36px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-bar {
      margin-top: 10px;
      text-align: center;
      font-size: 13px;
      color: var(--subtext);
      height: 18px;
    }

    /* ── Sidebar ── */
    .sidebar { width: 250px; display: flex; flex-direction: column; gap: 16px; }

    .panel {
      background: var(--panel-bg);
      border-radius: 14px;
      padding: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px var(--shadow);
    }

    .panel-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--subtext);
      margin-bottom: 12px;
    }

    /* Style buttons */
    .style-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .style-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 6px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--btn-bg);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }
    .style-btn:hover { border-color: var(--btn-active); background: var(--btn-hover); }
    .style-btn.active {
      border-color: var(--btn-active);
      background: var(--btn-active);
      color: var(--btn-active-text);
    }
    .style-btn .icon { font-size: 20px; }

    /* Color swatches */
    .color-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .color-swatch {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      outline: none;
      transition: transform 0.15s;
    }
    .color-swatch:hover { transform: scale(1.18); }
    .color-swatch.active {
      box-shadow: 0 0 0 2px var(--panel-bg), 0 0 0 4px var(--btn-active);
    }

    /* Opacity slider */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }
    .slider-row label { font-size: 12px; color: var(--subtext); white-space: nowrap; }
    input[type=range] { flex: 1; accent-color: var(--btn-active); }

    /* Mobile */
    @media (max-width: 680px) {
      .main { flex-direction: column; }
      .sidebar { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <h1>✂️ 남성 헤어스타일 시뮬레이터</h1>
  <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">
    <span id="theme-icon">🌙</span>
    <span id="theme-label">다크 모드</span>
  </button>
</header>

<div class="main">

  <!-- Camera -->
  <div class="cam-section">
    <div class="viewer-wrap">
      <video id="cam" playsinline autoplay muted></video>
      <canvas id="overlay" width="640" height="480"></canvas>
      <div id="loading">
        <div class="spinner"></div>
        <span id="loading-msg">카메라를 초기화하는 중...</span>
      </div>
    </div>
    <p class="status-bar" id="status"></p>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="panel">
      <div class="panel-title">헤어스타일</div>
      <div class="style-grid" id="style-grid"></div>
    </div>

    <div class="panel">
      <div class="panel-title">헤어 색상</div>
      <div class="color-grid" id="color-grid"></div>
    </div>

    <div class="panel">
      <div class="panel-title">불투명도</div>
      <div class="slider-row">
        <label>투명</label>
        <input type="range" id="opacity-slider" min="40" max="100" value="88">
        <label>진하게</label>
      </div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
//  THEME
// ════════════════════════════════════════
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-icon').textContent  = t === 'dark' ? '☀️' : '🌙';
  document.getElementById('theme-label').textContent = t === 'dark' ? '라이트 모드' : '다크 모드';
  localStorage.setItem('theme', t);
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}
applyTheme(localStorage.getItem('theme') || 'light');

// ════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════
const STYLES = [
  { id: 'twoblock', label: '투블럭',  icon: '💈' },
  { id: 'regent',   label: '리젠트',  icon: '👑' },
  { id: 'sidepart', label: '가르마',  icon: '〰️' },
  { id: 'wolfcut',  label: '울프컷',  icon: '🐺' },
  { id: 'pomade',   label: '포마드',  icon: '✨' },
  { id: 'buzz',     label: '버즈컷',  icon: '⚡' },
];

const COLORS = [
  { hex: '#100a04', label: '자연 검정'   },
  { hex: '#2c1509', label: '다크 브라운' },
  { hex: '#5c2e0e', label: '브라운'      },
  { hex: '#8b4513', label: '라이트 브라운'},
  { hex: '#b07030', label: '캐러멜'      },
  { hex: '#c8a040', label: '골든 블론드' },
  { hex: '#787878', label: '애쉬 그레이' },
  { hex: '#cac8c0', label: '플래티넘'    },
  { hex: '#5a1020', label: '버건디'      },
  { hex: '#0d0d22', label: '블루 블랙'   },
];

let activeStyle  = 'twoblock';
let activeColor  = '#100a04';
let hairOpacity  = 0.88;

// ════════════════════════════════════════
//  BUILD UI
// ════════════════════════════════════════
const styleGrid = document.getElementById('style-grid');
STYLES.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'style-btn' + (s.id === activeStyle ? ' active' : '');
  btn.dataset.id = s.id;
  btn.innerHTML = `<span class="icon">${s.icon}</span>${s.label}`;
  btn.addEventListener('click', () => {
    activeStyle = s.id;
    document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
  styleGrid.appendChild(btn);
});

const colorGrid = document.getElementById('color-grid');
COLORS.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'color-swatch' + (c.hex === activeColor ? ' active' : '');
  btn.style.background = c.hex;
  btn.title = c.label;
  btn.addEventListener('click', () => {
    activeColor = c.hex;
    document.querySelectorAll('.color-swatch').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
  colorGrid.appendChild(btn);
});

document.getElementById('opacity-slider').addEventListener('input', e => {
  hairOpacity = parseInt(e.target.value) / 100;
});

// ════════════════════════════════════════
//  CANVAS + COORDINATE HELPERS
// ════════════════════════════════════════
const canvas = document.getElementById('overlay');
const ctx    = canvas.getContext('2d');
const W = 640, H = 480;

// Convert normalized MediaPipe landmark → mirrored canvas px
function lp(lms, idx) {
  return {
    x: (1 - lms[idx].x) * W,   // flip X for selfie mirror
    y: lms[idx].y * H
  };
}

function hex2rgb(hex) {
  return {
    r: parseInt(hex.slice(1,3), 16),
    g: parseInt(hex.slice(3,5), 16),
    b: parseInt(hex.slice(5,7), 16),
  };
}

function hairColor(alpha) {
  const { r, g, b } = hex2rgb(activeColor);
  return `rgba(${r},${g},${b},${(alpha * hairOpacity).toFixed(2)})`;
}

function lightenHex(hex, amount) {
  const { r, g, b } = hex2rgb(hex);
  return `rgb(${Math.min(r+amount,255)},${Math.min(g+amount,255)},${Math.min(b+amount,255)})`;
}

// ════════════════════════════════════════
//  HAIR DRAW FUNCTIONS
// ════════════════════════════════════════

function drawHair(lms) {
  // ── Key anchors ──
  const crown     = lp(lms, 10);   // forehead top-center
  const leftFace  = lp(lms, 234);  // left cheek edge (mirrored)
  const rightFace = lp(lms, 454);  // right cheek edge (mirrored)
  const chin      = lp(lms, 152);

  const cx       = (leftFace.x + rightFace.x) / 2;
  const faceW    = Math.abs(rightFace.x - leftFace.x);
  const faceH    = chin.y - crown.y;

  // Eyebrow average (for lift scaling)
  const browL = lp(lms, 107);
  const browR = lp(lms, 336);
  const browY  = (browL.y + browR.y) / 2;
  const lift   = (crown.y - browY) * 1.45;  // how far above crown hair sits

  // Reference points
  const topY   = crown.y - lift;                 // top of hair
  const headL  = cx - faceW * 0.58;             // left hair edge
  const headR  = cx + faceW * 0.58;             // right hair edge
  const earY   = crown.y + faceH * 0.52;        // ear-level

  ctx.save();

  switch (activeStyle) {
    case 'twoblock': drawTwoblock(cx, crown.y, topY, headL, headR, faceW, faceH, earY); break;
    case 'regent':   drawRegent  (cx, crown.y, topY, headL, headR, faceW, faceH, earY); break;
    case 'sidepart': drawSidepart(cx, crown.y, topY, headL, headR, faceW, faceH, earY); break;
    case 'wolfcut':  drawWolfcut (cx, crown.y, topY, headL, headR, faceW, faceH, earY); break;
    case 'pomade':   drawPomade  (cx, crown.y, topY, headL, headR, faceW, faceH, earY); break;
    case 'buzz':     drawBuzz    (cx, crown.y, topY, headL, headR, faceW, faceH, earY); break;
  }

  ctx.restore();
}

// ── 투블럭 ────────────────────────────────────────────────
function drawTwoblock(cx, cY, topY, hL, hR, fw, fh, earY) {
  // Main top mass
  ctx.beginPath();
  ctx.moveTo(hL + fw * 0.08, cY + fh * 0.03);
  ctx.bezierCurveTo(
    hL + fw * 0.02, topY + fh * 0.06,
    cx - fw * 0.25, topY - fh * 0.04,
    cx, topY - fh * 0.06
  );
  ctx.bezierCurveTo(
    cx + fw * 0.25, topY - fh * 0.04,
    hR - fw * 0.02, topY + fh * 0.06,
    hR - fw * 0.08, cY + fh * 0.03
  );
  ctx.quadraticCurveTo(cx, cY + fh * 0.15, hL + fw * 0.08, cY + fh * 0.03);
  ctx.fillStyle = hairColor(1);
  ctx.fill();

  // Thin shaved sides
  for (const [sx, dir] of [[hL, 1], [hR, -1]]) {
    ctx.beginPath();
    ctx.moveTo(sx + fw * 0.06 * dir, cY + fh * 0.03);
    ctx.lineTo(sx, cY + fh * 0.1);
    ctx.lineTo(sx - fw * 0.015 * dir, earY + fh * 0.02);
    ctx.lineTo(sx + fw * 0.06 * dir, earY - fh * 0.04);
    ctx.lineTo(sx + fw * 0.1  * dir, cY + fh * 0.1);
    ctx.closePath();
    ctx.fillStyle = hairColor(0.52);
    ctx.fill();
  }

  // Hair texture lines on top
  ctx.strokeStyle = hairColor(0.22);
  ctx.lineWidth = 1;
  ctx.lineCap = 'round';
  for (let i = 0; i < 6; i++) {
    const tx = hL + fw * 0.12 + i * (fw * 0.62 / 5);
    ctx.beginPath();
    ctx.moveTo(tx, cY + fh * 0.02);
    ctx.quadraticCurveTo(tx + fw * 0.01, topY + fh * 0.06, tx, topY + fh * 0.02);
    ctx.stroke();
  }
}

// ── 리젠트 ────────────────────────────────────────────────
function drawRegent(cx, cY, topY, hL, hR, fw, fh, earY) {
  // Voluminous swept-back pompadour
  ctx.beginPath();
  ctx.moveTo(hL + fw * 0.06, cY + fh * 0.04);
  ctx.bezierCurveTo(
    hL - fw * 0.02, topY - fh * 0.12,
    cx - fw * 0.28, topY - fh * 0.42,
    cx, topY - fh * 0.46
  );
  ctx.bezierCurveTo(
    cx + fw * 0.28, topY - fh * 0.42,
    hR + fw * 0.02, topY - fh * 0.12,
    hR - fw * 0.06, cY + fh * 0.04
  );
  ctx.quadraticCurveTo(cx, cY + fh * 0.12, hL + fw * 0.06, cY + fh * 0.04);
  ctx.fillStyle = hairColor(1);
  ctx.fill();

  // Front quiff peak (asymmetric)
  ctx.beginPath();
  ctx.moveTo(hL + fw * 0.1, cY + fh * 0.06);
  ctx.bezierCurveTo(
    hL + fw * 0.06, topY - fh * 0.1,
    cx - fw * 0.15, topY - fh * 0.35,
    cx + fw * 0.12, topY - fh * 0.3
  );
  ctx.quadraticCurveTo(cx + fw * 0.2, topY - fh * 0.1, cx, cY + fh * 0.05);
  ctx.closePath();
  ctx.fillStyle = hairColor(0.75);
  ctx.fill();

  // Short sides
  for (const [sx, dir] of [[hL, 1], [hR, -1]]) {
    ctx.beginPath();
    ctx.moveTo(sx + fw * 0.06 * dir, cY + fh * 0.04);
    ctx.lineTo(sx, cY + fh * 0.12);
    ctx.lineTo(sx - fw * 0.02 * dir, earY + fh * 0.02);
    ctx.lineTo(sx + fw * 0.08 * dir, earY - fh * 0.04);
    ctx.lineTo(sx + fw * 0.08 * dir, cY + fh * 0.1);
    ctx.closePath();
    ctx.fillStyle = hairColor(0.58);
    ctx.fill();
  }

  // Sweep-back lines
  ctx.strokeStyle = hairColor(0.2);
  ctx.lineWidth = 1.4;
  ctx.lineCap = 'round';
  for (let i = 0; i < 5; i++) {
    const ox = hL + fw * 0.12 + i * fw * 0.14;
    ctx.beginPath();
    ctx.moveTo(ox, cY + fh * 0.05);
    ctx.bezierCurveTo(ox + fw * 0.08, topY + fh * 0.04, ox + fw * 0.14, topY - fh * 0.22, cx + fw * 0.08, topY - fh * 0.38);
    ctx.stroke();
  }
}

// ── 가르마 ────────────────────────────────────────────────
function drawSidepart(cx, cY, topY, hL, hR, fw, fh, earY) {
  const partX = cx - fw * 0.12; // part line slightly left of center

  // Full hair body
  ctx.beginPath();
  ctx.moveTo(hL, cY + fh * 0.06);
  ctx.bezierCurveTo(hL - fw * 0.02, topY + fh * 0.06, cx - fw * 0.12, topY - fh * 0.08, cx, topY - fh * 0.1);
  ctx.bezierCurveTo(cx + fw * 0.12, topY - fh * 0.08, hR + fw * 0.02, topY + fh * 0.06, hR, cY + fh * 0.06);
  ctx.quadraticCurveTo(cx, cY + fh * 0.15, hL, cY + fh * 0.06);
  ctx.fillStyle = hairColor(1);
  ctx.fill();

  // Left combed section
  ctx.beginPath();
  ctx.moveTo(partX, topY - fh * 0.06);
  ctx.quadraticCurveTo(partX - fw * 0.22, cY - fh * 0.04, hL + fw * 0.04, cY + fh * 0.06);
  ctx.quadraticCurveTo(hL - fw * 0.01, cY + fh * 0.06, hL, cY + fh * 0.08);
  ctx.quadraticCurveTo(partX - fw * 0.1, cY + fh * 0.08, partX, topY - fh * 0.06);
  ctx.fillStyle = hairColor(0.72);
  ctx.fill();

  // Part gap line
  ctx.beginPath();
  ctx.moveTo(partX, topY - fh * 0.04);
  ctx.quadraticCurveTo(partX + fw * 0.02, cY - fh * 0.04, partX + fw * 0.03, cY + fh * 0.05);
  ctx.strokeStyle = `rgba(0,0,0,${0.08 * hairOpacity})`;
  ctx.lineWidth = fw * 0.028;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Comb lines
  ctx.strokeStyle = hairColor(0.16);
  ctx.lineWidth = 1;
  for (let i = 0; i < 7; i++) {
    const tx = hL + fw * 0.08 + i * fw * 0.13;
    const dir = tx < partX ? -1 : 1;
    ctx.beginPath();
    ctx.moveTo(tx, cY + fh * 0.04);
    ctx.quadraticCurveTo(tx + dir * fw * 0.04, topY + fh * 0.06, tx + dir * fw * 0.07, topY);
    ctx.stroke();
  }

  // Sides
  for (const [sx, dir] of [[hL, 1], [hR, -1]]) {
    ctx.beginPath();
    ctx.moveTo(sx + fw * 0.01 * dir, cY + fh * 0.06);
    ctx.lineTo(sx - fw * 0.01 * dir, earY + fh * 0.04);
    ctx.lineTo(sx + fw * 0.08 * dir, earY);
    ctx.lineTo(sx + fw * 0.06 * dir, cY + fh * 0.1);
    ctx.closePath();
    ctx.fillStyle = hairColor(0.55);
    ctx.fill();
  }
}

// ── 울프컷 ────────────────────────────────────────────────
function drawWolfcut(cx, cY, topY, hL, hR, fw, fh, earY) {
  // Main voluminous top
  ctx.beginPath();
  ctx.moveTo(hL + fw * 0.02, cY + fh * 0.08);
  ctx.bezierCurveTo(
    hL - fw * 0.06, topY + fh * 0.04,
    cx - fw * 0.38, topY - fh * 0.2,
    cx, topY - fh * 0.24
  );
  ctx.bezierCurveTo(
    cx + fw * 0.38, topY - fh * 0.2,
    hR + fw * 0.06, topY + fh * 0.04,
    hR - fw * 0.02, cY + fh * 0.08
  );
  ctx.quadraticCurveTo(cx, cY + fh * 0.16, hL + fw * 0.02, cY + fh * 0.08);
  ctx.fillStyle = hairColor(0.95);
  ctx.fill();

  // Long layered sides (울프컷 특징)
  for (const [sx, dir] of [[hL, 1], [hR, -1]]) {
    ctx.beginPath();
    ctx.moveTo(sx + fw * 0.02 * dir, cY + fh * 0.06);
    ctx.bezierCurveTo(
      sx - fw * 0.05 * dir, cY + fh * 0.28,
      sx - fw * 0.07 * dir, earY + fh * 0.02,
      sx + fw * 0.04 * dir, earY + fh * 0.22
    );
    ctx.lineTo(sx + fw * 0.16 * dir, earY + fh * 0.18);
    ctx.bezierCurveTo(
      sx + fw * 0.1  * dir, earY,
      sx + fw * 0.08 * dir, cY + fh * 0.3,
      sx + fw * 0.06 * dir, cY + fh * 0.09
    );
    ctx.closePath();
    ctx.fillStyle = hairColor(0.82);
    ctx.fill();
  }

  // Curtain fringe strands
  ctx.lineWidth = fw * 0.025;
  ctx.lineCap = 'round';
  const strands = [
    [cx - fw*0.22, cY - fh*0.02, cx - fw*0.26, cY + fh*0.15],
    [cx - fw*0.09, cY - fh*0.03, cx - fw*0.11, cY + fh*0.14],
    [cx + fw*0.01, cY - fh*0.03, cx + fw*0.02, cY + fh*0.14],
    [cx + fw*0.14, cY - fh*0.02, cx + fw*0.18, cY + fh*0.14],
    [cx + fw*0.25, cY - fh*0.01, cx + fw*0.28, cY + fh*0.13],
  ];
  strands.forEach(([x1, y1, x2, y2]) => {
    ctx.beginPath();
    ctx.strokeStyle = hairColor(0.72);
    ctx.moveTo(x1, y1);
    ctx.quadraticCurveTo(x1 + (x2-x1)*0.2, y1 + (y2-y1)*0.5, x2, y2);
    ctx.stroke();
  });

  // Layer texture
  ctx.strokeStyle = hairColor(0.18);
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const tx = hL + fw * 0.1 + i * fw * 0.16;
    ctx.beginPath();
    ctx.moveTo(tx, cY + fh * 0.06);
    ctx.quadraticCurveTo(tx - fw * 0.01, topY + fh * 0.08, tx + fw * 0.01, topY + fh * 0.02);
    ctx.stroke();
  }
}

// ── 포마드 ────────────────────────────────────────────────
function drawPomade(cx, cY, topY, hL, hR, fw, fh, earY) {
  // Slick smooth mass
  ctx.beginPath();
  ctx.moveTo(hL + fw * 0.06, cY + fh * 0.04);
  ctx.bezierCurveTo(
    hL + fw * 0.02, topY + fh * 0.1,
    cx - fw * 0.24, topY - fh * 0.08,
    cx, topY - fh * 0.12
  );
  ctx.bezierCurveTo(
    cx + fw * 0.24, topY - fh * 0.08,
    hR - fw * 0.02, topY + fh * 0.1,
    hR - fw * 0.06, cY + fh * 0.04
  );
  ctx.quadraticCurveTo(cx, cY + fh * 0.12, hL + fw * 0.06, cY + fh * 0.04);
  ctx.fillStyle = hairColor(1);
  ctx.fill();

  // Shine gradient
  const grad = ctx.createLinearGradient(cx - fw * 0.3, topY, cx + fw * 0.1, cY + fh * 0.04);
  grad.addColorStop(0, 'rgba(255,255,255,0)');
  grad.addColorStop(0.35, `rgba(255,255,255,${0.14 * hairOpacity})`);
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.moveTo(hL + fw * 0.06, cY + fh * 0.04);
  ctx.bezierCurveTo(hL + fw * 0.02, topY + fh * 0.1, cx - fw * 0.24, topY - fh * 0.08, cx, topY - fh * 0.12);
  ctx.bezierCurveTo(cx + fw * 0.24, topY - fh * 0.08, hR - fw * 0.02, topY + fh * 0.1, hR - fw * 0.06, cY + fh * 0.04);
  ctx.quadraticCurveTo(cx, cY + fh * 0.12, hL + fw * 0.06, cY + fh * 0.04);
  ctx.fillStyle = grad;
  ctx.fill();

  // Slick-back comb lines
  ctx.strokeStyle = hairColor(0.16);
  ctx.lineWidth = 1.1;
  ctx.lineCap = 'round';
  for (let i = 0; i < 8; i++) {
    const tx = hL + fw * 0.09 + i * fw * 0.11;
    ctx.beginPath();
    ctx.moveTo(tx, cY + fh * 0.04);
    ctx.bezierCurveTo(tx + fw * 0.05, topY + fh * 0.08, tx + fw * 0.07, topY + fh * 0.02, tx + fw * 0.08, topY - fh * 0.04);
    ctx.stroke();
  }

  // Short sides
  for (const [sx, dir] of [[hL, 1], [hR, -1]]) {
    ctx.beginPath();
    ctx.moveTo(sx + fw * 0.06 * dir, cY + fh * 0.04);
    ctx.lineTo(sx, cY + fh * 0.1);
    ctx.lineTo(sx - fw * 0.01 * dir, earY);
    ctx.lineTo(sx + fw * 0.09 * dir, earY - fh * 0.04);
    ctx.lineTo(sx + fw * 0.07 * dir, cY + fh * 0.09);
    ctx.closePath();
    ctx.fillStyle = hairColor(0.58);
    ctx.fill();
  }
}

// ── 버즈컷 ────────────────────────────────────────────────
function drawBuzz(cx, cY, topY, hL, hR, fw, fh, earY) {
  // Very thin close-cropped layer
  ctx.beginPath();
  ctx.moveTo(hL - fw * 0.01, cY + fh * 0.06);
  ctx.quadraticCurveTo(hL - fw * 0.04, topY + fh * 0.08, cx - fw * 0.04, topY + fh * 0.01);
  ctx.quadraticCurveTo(cx, topY - fh * 0.02, cx + fw * 0.04, topY + fh * 0.01);
  ctx.quadraticCurveTo(hR + fw * 0.04, topY + fh * 0.08, hR + fw * 0.01, cY + fh * 0.06);
  ctx.quadraticCurveTo(cx, cY + fh * 0.1, hL - fw * 0.01, cY + fh * 0.06);
  ctx.fillStyle = hairColor(0.65);
  ctx.fill();

  // Stubble dots on top
  ctx.fillStyle = hairColor(0.5);
  for (let i = 0; i < 55; i++) {
    const t = i / 54;
    const angle = Math.PI * t;
    const rx = fw * 0.52, ry = (topY - cY + fh * 0.06) * 0.56;
    const bx = cx + Math.cos(Math.PI - angle) * rx;
    const by = cY + fh * 0.03 - Math.sin(angle) * ry * 0.9;
    ctx.beginPath();
    ctx.arc(bx, by, fw * 0.008, 0, Math.PI * 2);
    ctx.fill();
  }

  // Side stubble strokes
  ctx.strokeStyle = hairColor(0.42);
  ctx.lineWidth   = 0.8;
  ctx.lineCap     = 'round';
  for (const [sx, dir] of [[hL, 1], [hR, -1]]) {
    for (let j = 0; j < 18; j++) {
      const fy = cY + fh * 0.08 + j * (earY - cY - fh * 0.06) / 18;
      const fx = sx + (Math.random() - 0.5) * fw * 0.02;
      ctx.beginPath();
      ctx.moveTo(fx, fy);
      ctx.lineTo(fx + dir * fw * 0.012, fy - fw * 0.014);
      ctx.stroke();
    }
  }
}

// ════════════════════════════════════════
//  MEDIAPIPE SETUP
// ════════════════════════════════════════
const statusEl  = document.getElementById('status');
const loadingEl = document.getElementById('loading');
const loadMsgEl = document.getElementById('loading-msg');
const videoEl   = document.getElementById('cam');

const faceMesh = new FaceMesh({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: false,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

faceMesh.onResults((results) => {
  ctx.clearRect(0, 0, W, H);

  if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
    statusEl.textContent = '얼굴 인식 중 ✓';
    drawHair(results.multiFaceLandmarks[0]);
  } else {
    statusEl.textContent = '얼굴을 카메라 중앙에 맞춰주세요';
  }
});

const camera = new Camera(videoEl, {
  onFrame: async () => {
    await faceMesh.send({ image: videoEl });
  },
  width: 640,
  height: 480
});

camera.start()
  .then(() => {
    loadingEl.classList.add('hidden');
    statusEl.textContent = '카메라 연결됨 — 얼굴을 맞춰주세요';
  })
  .catch((err) => {
    loadMsgEl.textContent = '카메라 접근 실패: ' + err.message;
    document.querySelector('.spinner').style.display = 'none';
  });
</script>
